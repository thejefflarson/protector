# One-off: generate vmlinux.rs (struct file/path bindings) for the secret-read probe's
# bpf_d_path. The runner has the node BTF but not bpftool/clang/aya-tool and can't apt;
# it IS dind, so we run a container that has the tools and generate from the node BTF.
# Manually scoped to this branch; delete once vmlinux.rs is committed.
name: ebpf-env-probe
on:
  push:
    branches: ["feat/secret-read-probe-phase2"]
    paths: [".github/workflows/ebpf-env-probe.yml"]
jobs:
  gen-vmlinux:
    runs-on: protector-runners
    steps:
      - name: Stage node BTF
        run: cp /sys/kernel/btf/vmlinux ./vmlinux && ls -la ./vmlinux
      - name: Generate vmlinux.rs in a container (bpftool + clang + aya-tool)
        run: |
          docker run --rm -v "$PWD:/work" -w /work rust:1-bookworm bash -euxc '
            apt-get update
            apt-get install -y --no-install-recommends bpftool clang libclang-dev
            cargo install aya-tool
            "$HOME/.cargo/bin/aya-tool" generate --btf /work/vmlinux file path > /work/vmlinux.rs
            echo "=== generated vmlinux.rs ==="
            wc -l /work/vmlinux.rs
            head -40 /work/vmlinux.rs
          '
      - name: Upload vmlinux.rs
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux-rs
          path: vmlinux.rs
          retention-days: 1
