# One-off diagnostic: what does the self-hosted Pi runner actually have for generating
# vmlinux bindings (needed for the secret-read probe's bpf_d_path)? Manually triggered;
# safe (read-only probe). Delete once the secret-read build approach is settled.
name: ebpf-env-probe
on:
  push:
    branches: ["feat/secret-read-probe-phase2"]
    paths: [".github/workflows/ebpf-env-probe.yml"]
jobs:
  probe:
    runs-on: protector-runners
    steps:
      - name: Probe eBPF build environment
        run: |
          echo "== uname =="; uname -a
          echo "== kernel BTF on the runner =="
          ls -la /sys/kernel/btf/vmlinux 2>&1 || echo "NO /sys/kernel/btf/vmlinux on the runner"
          echo "== tools present =="
          for t in bpftool clang pahole cargo rustc git; do
            printf "%s: " "$t"; command -v "$t" 2>/dev/null || echo "MISSING"
          done
          echo "== passwordless sudo (for apt installs)? =="
          (sudo -n true 2>/dev/null && echo "sudo: ok") || echo "sudo: NO"
          echo "== rust =="; cargo --version 2>&1 || true; rustc --version 2>&1 || true
      - name: Stage node BTF for upload
        run: cp /sys/kernel/btf/vmlinux "$RUNNER_TEMP/vmlinux" && ls -la "$RUNNER_TEMP/vmlinux"
      - name: Upload node BTF
        uses: actions/upload-artifact@v4
        with:
          name: node-btf
          path: ${{ runner.temp }}/vmlinux
          retention-days: 1
