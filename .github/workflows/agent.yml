name: Agent
# Build (and on a tag, publish + sign) the protector-agent image — the first-party
# eBPF behavioral collector (ADR-0014). Separate from the engine image: it's a
# different binary with a different lifecycle. Only triggers on changes under agent/
# so engine-only changes don't rebuild it. Like the engine image, push+sign happen
# ONLY on a version tag; PRs do a build-only validation (no push).
permissions:
  contents: read
on:
  push:
    branches: ["main"]
    tags: ['v*.*.*']
    # behavior/** too: the agent shares that crate, so a wire-type change must rebuild it.
    paths: ["agent/**", "behavior/**", ".github/workflows/agent.yml"]
  pull_request:
    branches: ["main"]
    paths: ["agent/**", "behavior/**", ".github/workflows/agent.yml"]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-agent
# One agent build per ref; a newer push supersedes an in-flight one.
concurrency:
  group: agent-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # Compile the BPF programs to bytecode on the self-hosted runners — their image
  # (../runner) bakes in nightly + rust-src + a prebuilt bpf-linker (ADR-0014), so the
  # job is just the compile (the tiny eBPF crate; the LLVM-heavy bpf-linker build was
  # done once at image-build time). BPF is architecture-neutral bytecode, CO-RE-
  # relocated against the node's BTF at load.
  ebpf:
    runs-on: protector-runners
    # Self-hosted + persistent: never execute forked-PR code (mirrors the docker job).
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Enable rust
        # The runner image installs rust under ~/.cargo/bin but doesn't put it on PATH.
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Compile agent with eBPF
        # --features ebpf: build.rs compiles the BPF object (nightly + bpf-linker, baked
        # into the runner image) and the userspace aya loader links it in. Full check.
        working-directory: agent/protector-agent
        run: cargo build --features ebpf
  image:
    runs-on: protector-runners
    # Never run forked-PR code on the self-hosted runners (arbitrary code execution on
    # the build infra). Push events and same-repo PRs only — mirrors rust.yml.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Log into registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Bare semver (v0.3.30 -> 0.3.30) so the tag matches the chart's appVersion
          # default — the agent versions in lockstep with the engine.
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver: remote
          endpoint: tcp://buildkit.dev.svc.cluster.local:1234
          driver-opts: |
            cacert=/home/runner/buildkit-certs/ca.crt
            cert=/home/runner/buildkit-certs/tls.crt
            key=/home/runner/buildkit-certs/tls.key
      # The image is built WITH the eBPF probe: agent/Dockerfile runs
      # `cargo build --release -p protector-agent --features ebpf`, and its build.rs compiles
      # the sibling protector-agent-ebpf crate to a BPF object (bpf-linker, nightly) embedded in
      # the binary and CO-RE-relocated against the node's BTF at load (ADR-0014). The default
      # (no-feature) build — a no-op observer — exists only for toolchain-free local dev/test.
      - name: Build and push agent image
        id: build-and-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          # Repo root: the agent's userspace crate path-depends on ../../behavior (the
          # shared wire crate outside agent/), so the Dockerfile copies agent/ + behavior/.
          context: .
          file: agent/Dockerfile
          # Multi-arch: cluster BuildKit (amd64 node + QEMU) builds amd64 native + arm64 emulated.
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cache
          # Exporting cache pushes to the cache repo, which needs the registry login that
          # is gated off for PRs — so only export on non-PR events (otherwise PR builds
          # 403 on cache export even though the build itself succeeded).
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}-cache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}
          provenance: false
          sbom: false
      - name: Install cosign
        if: ${{ github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign the published image
        if: ${{ github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          set -euo pipefail
          [[ "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "missing/invalid build digest: '$DIGEST'" >&2; exit 1; }
          echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
