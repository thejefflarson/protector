name: Build
permissions:
  contents: read
  pull-requests: write
on:
  push:
    branches: ["main"]
    tags: ['v*.*.*']
  pull_request:
    branches: ["main"]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  # fmt+clippy and audit+test run as two parallel jobs so clippy no longer serializes
  # ahead of the test build. They share ONE warm target/ via the rust-cache `shared-key`
  # (the dep graph is identical), so the parallelism costs no extra compilation — only a
  # second checkout/toolchain/sccache-install (~15s). Whichever job saves the shared key
  # first wins; the other's save is a benign no-op.
  lint:
    permissions:
      contents: read
    # Self-hosted protector-runners (meshed) so cargo uses the shared in-cluster sccache
    # redis. Sized in the cluster repo (charts/actions/runners/values-protector.yaml —
    # 6Gi/8Gi + anti-affinity onto the 16GB nodes); the base 3Gi runner OOM-killed this.
    runs-on: protector-runners
    env:
      # sccache → shared in-cluster redis (cluster repo: charts/sccache). Reachable only
      # through Linkerd mTLS (the protector runner identity is admitted); it carries no
      # credentials, so it lives here. CARGO_INCREMENTAL=0 — sccache needs it off.
      RUSTC_WRAPPER: sccache
      SCCACHE_REDIS: redis://sccache-redis.dev.svc.cluster.local:6379
      CARGO_INCREMENTAL: "0"
      # Authenticate binstall's GitHub REST API calls (release-artifact lookups). The
      # self-hosted runners share one egress IP, so the anonymous 60-req/hr/IP limit is
      # exhausted fast → 403 Forbidden on api.github.com (same class as the Docker Hub 429
      # in 1aaf4a5). The job's own GITHUB_TOKEN lifts it to 5000/hr; binstall reads it
      # automatically. Durable follow-up: bake sccache/nextest/cargo-audit into the runner image.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
      with:
        toolchain: stable
        components: clippy, rustfmt
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        # A stable shared-key (replacing the per-job default) keeps target/ warm across
        # runs AND shared with the `test` job, so cargo fingerprint-skips unchanged deps
        # instead of re-materializing the whole dep graph from sccache-redis (~1400
        # hit-fetches + links, ~5 min, even at a 99.9% sccache hit rate). The lockfile
        # hash is still appended automatically, so a dep bump rotates the key (warm-
        # starting from the previous lockfile). sccache is the fallback for real misses.
        shared-key: protector
        cache-all-crates: "true"
        cache-targets: false
    - name: Install sccache
      # --force: rust-cache restores cargo's "already installed" metadata on a warm
      # cache, but not the binary, so a plain binstall skips and sccache is absent
      # from PATH (RUSTC_WRAPPER then fails). Force a real install every run.
      run: cargo binstall --no-confirm --force sccache
    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: "22"
    - name: Build dashboard bundle
      # The engine `include_str!`s engine/web/dist/dashboard.js, which is gitignored
      # (built from source, never committed — ADR-0025). Build it BEFORE cargo compiles
      # the engine, or `cargo fmt --check`/`clippy`/`nextest` fail to find it. npm fetches
      # preact+esbuild-wasm the same way cargo fetches crates; --ignore-scripts kills
      # install hooks.
      run: |
        npm --prefix engine/web ci --ignore-scripts
        npm --prefix engine/web run build
    - name: Lint dashboard client (eslint + jsx-a11y)
      # JEF-499: the accessibility gate. eslint-plugin-jsx-a11y (recommended, mapped onto Preact
      # JSX) fails the build on an a11y authoring regression in engine/web/src; the axe route-smoke
      # (the runtime half) runs in the `test` job's `npm run test`. Deps were installed by the
      # `npm ci --ignore-scripts` above.
      run: npm --prefix engine/web run lint
    - name: Format
      run: cargo fmt --check
    - name: Clippy
      run: cargo clippy --all-targets -- -D warnings
    - name: sccache stats
      if: always()
      run: sccache --show-stats

  test:
    permissions:
      contents: read
    runs-on: protector-runners
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_REDIS: redis://sccache-redis.dev.svc.cluster.local:6379
      CARGO_INCREMENTAL: "0"
      # Authenticate binstall's GitHub REST API calls (release-artifact lookups). The
      # self-hosted runners share one egress IP, so the anonymous 60-req/hr/IP limit is
      # exhausted fast → 403 Forbidden on api.github.com (same class as the Docker Hub 429
      # in 1aaf4a5). The job's own GITHUB_TOKEN lifts it to 5000/hr; binstall reads it
      # automatically. Durable follow-up: bake sccache/nextest/cargo-audit into the runner image.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
      with:
        toolchain: stable
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        # Same shared-key as `lint` so both jobs restore the one warm target/.
        shared-key: protector
        cache-all-crates: "true"
        cache-targets: false
    - name: Install sccache
      run: cargo binstall --no-confirm --force sccache
    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: "22"
    - name: Build dashboard bundle
      # Same as the lint job: build the gitignored Preact bundle (ADR-0025) before cargo
      # compiles the engine, which `include_str!`s it. The dashboard guard tests also read
      # the built bundle, so it must exist before `cargo nextest run`.
      run: |
        npm --prefix engine/web ci --ignore-scripts
        npm --prefix engine/web run build
    - name: Dashboard client tests
      # The v4 Preact client's offline unit + interaction tests (vitest + jsdom, ADR-0025 /
      # JEF-397): the keyed reconcile, the state-preservation (JEF-351) acceptance test, client
      # escaping, the honesty empty-states, and the JEF-499 vitest-axe route-smoke (every top-level
      # view + AuthGate + status strip asserted free of serious/critical axe violations — an a11y
      # regression goes red here). `npm ci` above installed the dev toolchain.
      run: npm --prefix engine/web run test
    - name: Audit dependencies
      run: |
        # binstall a prebuilt binary instead of compiling cargo-audit from source.
        # --force for the same reason as sccache above: rust-cache restores cargo's
        # "already installed" metadata on a warm cache but not the binary, so a plain
        # binstall would skip and leave cargo-audit absent from PATH.
        cargo binstall --no-confirm --force cargo-audit
        # RUSTSEC-2023-0071 (rsa "Marvin" timing attack) has no fixed release and
        # reaches us only transitively via sigstore. protector does signature
        # verification (public-key ops), not the attacker-timed RSA private-key
        # decryption the attack targets, so it isn't an exposure here.
        cargo audit --ignore RUSTSEC-2023-0071
    - name: Run tests
      run: |
        # binstall a prebuilt binary instead of compiling cargo-nextest from source
        # (the larger of the two source builds). --force for the same warm-cache reason
        # as the sccache/cargo-audit steps above.
        cargo binstall --no-confirm --force cargo-nextest
        cargo nextest run
      env:
        RUST_BACKTRACE: 1
    - name: sccache stats
      if: always()
      run: sccache --show-stats

  docker:
    runs-on: protector-runners
    # Build + push + sign ONLY on a version tag. The deployable image is consumed
    # from semver tags (argocd-image-updater), so a main-branch docker build adds no
    # deploy value — and worse, a release pushes main and the tag together, so two
    # docker builds would run concurrently against the same remote buildkit + shared
    # registry cache and corrupt each other's layers (the intermittent `cook`/link
    # failures). main pushes still run the lint + test jobs (fmt/clippy/audit/test).
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write # JEF-275: write the Sigstore-signed SLSA build-provenance attestation
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Log into registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Emit the bare semver (v0.1.0 tag -> image tag 0.1.0) so the published
          # image matches what the Helm chart pulls by default
          # (image.tag | default .Chart.AppVersion, which has no leading "v").
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          driver: remote
          endpoint: tcp://buildkit.dev.svc.cluster.local:1234
          platforms: linux/amd64
          # buildkit enforces mTLS; client cert is mounted into the runner pod.
          driver-opts: |
            cacert=/home/runner/buildkit-certs/ca.crt
            cert=/home/runner/buildkit-certs/tls.crt
            key=/home/runner/buildkit-certs/tls.key
          # Native per-arch build: amd64 on buildkit (node-3), arm64 on the arm64 Pi
          # builder. Same client cert (shared buildkit-ca) authenticates to both.
          append: |
            - endpoint: tcp://buildkit-arm64.dev.svc.cluster.local:1234
              platforms: linux/arm64
              driver-opts:
                - cacert=/home/runner/buildkit-certs/ca.crt
                - cert=/home/runner/buildkit-certs/tls.crt
                - key=/home/runner/buildkit-certs/tls.key
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          # Multi-arch: buildx builds each arch on its native builder (amd64 on buildkit,
          # arm64 on buildkit-arm64) and merges the manifest — no QEMU emulation.
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cache,mode=max
          # SLSA build provenance + SBOM attestations, matching the other images.
          provenance: true
          sbom: true
      # First-party installer verifies the cosign binary's own checksum, unlike
      # a bare curl|chmod of a release asset.
      - name: Install cosign
        if: ${{ github.event_name != 'pull_request' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          set -euo pipefail
          [[ "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "missing/invalid build digest: '$DIGEST'" >&2; exit 1; }
          echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
      # Sigstore-signed SLSA build-provenance attestation (keyless: Fulcio + Rekor), pushed to ghcr
      # as an OCI referrer. This is what protector's own provenance observer VERIFIES (JEF-275): the
      # SLSA v1 predicate carries this repo + workflow as builder.id + workflow.repository, and the
      # keyless Fulcio/Rekor chain is what trips `keyless_verified` → the "verified" posture. The
      # buildx `provenance: true` above is the UNSIGNED variant embedded in the image index, which
      # the observer (which reads signed signature/referrer layers) never sees.
      - name: Attest build provenance (Sigstore-signed SLSA)
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true
