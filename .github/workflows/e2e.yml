name: e2e (k3d)
# The engine's cluster-facing glue — watch streams, the kube actuator's
# apply/delete, the Falco ingest, the isolation NetworkPolicy + self-revert — runs
# only against a real API server, so it's exercised here on a k3d cluster (k3d is
# k3s: same flannel + kube-router CNI as the Pis). See scripts/e2e.sh.
#
# Opt-in (workflow_dispatch), NOT per-PR: it builds an image and stands up a
# cluster — minutes, not seconds. It runs on a GitHub-hosted runner because it
# needs a local Docker daemon; the self-hosted protector-runners offload builds to
# a remote BuildKit and have no local daemon for k3d. The same script runs locally:
#   scripts/e2e.sh
permissions:
  contents: read
on:
  # Gate on every merge to main: each commit that could be tagged for release is
  # integration-tested before you cut the tag. Not per-PR — it builds an image and
  # stands up k3d (minutes, GitHub-hosted), too heavy for every push. Still runnable
  # on demand. The model-decides phase (E/F) needs an Ollama, which CI has none of,
  # so it self-skips; the deterministic phases (structural → cut → self-revert,
  # log4j-propose) all run.
  push:
    branches: ["main"]
  workflow_dispatch:
# One e2e at a time; a newer main push supersedes an in-flight run.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout protector
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install k3d
        # Pinned version + sha256 verification — no `curl | bash` of a mutable
        # upstream script (the repo pins all GitHub Actions to a SHA for the same
        # reason). jq, kubectl, docker are preinstalled on ubuntu-latest runners.
        # No Helm: protector is deployed from a self-contained manifest (deploy_protector
        # in scripts/e2e.sh), so there's no chart and no cross-repo cluster checkout.
        run: |
          set -euo pipefail
          K3D_VERSION=v5.8.3
          K3D_SHA256=dbaa79a76ace7f4ca230a1ff41dc7d8a5036a8ad0309e9c54f9bf3836dbe853e
          curl -fsSL -o k3d "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64"
          echo "${K3D_SHA256}  k3d" | sha256sum -c -
          install -m 0755 k3d /usr/local/bin/k3d
          k3d version
          kubectl version --client
      - name: Run the e2e
        run: scripts/e2e.sh
