name: Chart
# Lint + render the first-party Helm chart (charts/protector). Runs on GitHub-hosted
# runners — it's a pure helm lint/template, so it needs none of the in-cluster
# sccache/buildkit the self-hosted protector-runners exist for. Path-scoped so engine-
# or agent-only changes don't trigger it.
permissions:
  contents: read
on:
  push:
    branches: ["main"]
    paths: ["charts/**", ".github/workflows/chart.yml"]
  pull_request:
    branches: ["main"]
    paths: ["charts/**", ".github/workflows/chart.yml"]
concurrency:
  group: chart-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # First-party (Microsoft) Helm installer, pinned by commit SHA.
      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.18.4
      - name: Helm lint
        run: helm lint charts/protector
      # Render with the safe defaults AND with every opt-in armed, so a template that
      # only breaks under an opt-in (model, agent, notify, live actuator) is caught here.
      # Both must produce valid manifests.
      - name: Helm template (safe defaults)
        run: helm template protector charts/protector --namespace protector
      - name: Helm template (all opt-ins armed)
        run: |
          helm template protector charts/protector --namespace protector \
            --set agent.enabled=true \
            --set engine.enable=network \
            --set engine.actuator=networkpolicy \
            --set engine.actuationRBAC=true \
            --set engine.model.endpoint=http://model.svc:11434/v1/chat/completions \
            --set engine.model.name=test \
            --set otelEndpoint=http://otel.svc:4318 \
            --set engine.notify.url=https://sink.example/hook \
            --set registryAuth.dockerconfigSecret=registry \
            --set feedSync.enabled=true
      # Security invariants (ingest authn + webhook fail-closed). These assert the
      # rendered manifests carry the protections the security review required, so a
      # regression that quietly drops them fails CI rather than shipping.
      - name: Assert webhook fail-closed for the enforcing webhook
        run: |
          render=$(helm template protector charts/protector --namespace protector \
            --set webhook.enforcedNamespaceSelector.matchLabels.'protector\.dev/enforce'=true)
          echo "$render" | grep -q 'name: pods-enforce.protector.dev' \
            || { echo "missing enforcing webhook"; exit 1; }
          # The enforcing webhook must fail CLOSED and be scoped to the enforced label.
          echo "$render" | awk '/name: pods-enforce.protector.dev/,/port:/' \
            | grep -q 'failurePolicy: Fail' \
            || { echo "enforcing webhook is not failurePolicy: Fail"; exit 1; }
          echo "$render" | awk '/name: pods-enforce.protector.dev/,/port:/' \
            | grep -q 'operator: In' \
            || { echo "enforcing webhook missing namespaceSelector In match"; exit 1; }
          # The audit webhook must stay fail-open so a protector outage can't block
          # namespaces that never opted into enforcement.
          echo "$render" | awk '/name: pods.protector.dev/,/port:/' \
            | grep -q 'failurePolicy: Ignore' \
            || { echo "audit webhook is not failurePolicy: Ignore"; exit 1; }
      - name: Assert ingest auth Secret mounts on engine AND agent
        run: |
          render=$(helm template protector charts/protector --namespace protector \
            --set agent.enabled=true)
          echo "$render" | grep -q 'name: protector-ingest-auth' \
            || { echo "ingest Secret not provisioned"; exit 1; }
          # Both the Deployment and the DaemonSet must read the token file.
          count=$(echo "$render" | grep -c 'name: PROTECTOR_INGEST_TOKEN_FILE')
          [ "$count" -ge 2 ] \
            || { echo "ingest token not mounted on both workloads (found $count)"; exit 1; }
      - name: Assert ingestAuth.enabled=false drops the Secret + mounts
        run: |
          render=$(helm template protector charts/protector --namespace protector \
            --set agent.enabled=true --set ingestAuth.enabled=false)
          if echo "$render" | grep -q 'PROTECTOR_INGEST_TOKEN_FILE'; then
            echo "ingest token wired despite ingestAuth.enabled=false"; exit 1
          fi
          if echo "$render" | grep -q 'protector-ingest-auth'; then
            echo "ingest Secret rendered despite ingestAuth.enabled=false"; exit 1
          fi
          echo "ok"
      - name: Assert feed-fetcher sidecar is ON by default and auto-wires the engine
        run: |
          # JEF-238 default-on: a stock install must render the feed-fetcher NATIVE SIDECAR
          # (an initContainer with restartPolicy: Always) on the engine pod, a shared feeds
          # emptyDir, and the engine auto-wired to the KEV file via PROTECTOR_KEV_FILE — with
          # NO CronJob, NO ConfigMap, and NO feed-sync RBAC (the sidecar makes no apiserver
          # call). The engine itself stays zero-egress: it only reads the file the sidecar
          # writes into the shared volume.
          render=$(helm template protector charts/protector --namespace protector)
          echo "$render" | grep -q 'name: feed-fetcher' \
            || { echo "feed-fetcher sidecar not rendered by default"; exit 1; }
          # A native sidecar = an initContainer that keeps running (restartPolicy: Always).
          echo "$render" | awk '/name: feed-fetcher/,/volumeMounts:/' \
            | grep -q 'restartPolicy: Always' \
            || { echo "feed-fetcher is not a native sidecar (restartPolicy: Always)"; exit 1; }
          # The shared scratch volume the sidecar writes and the engine reads.
          echo "$render" | grep -q 'emptyDir' \
            || { echo "shared feeds emptyDir not rendered"; exit 1; }
          # Engine auto-wired to the KEV file the sidecar writes (no explicit ConfigMap).
          echo "$render" | grep -q 'PROTECTOR_KEV_FILE' \
            || { echo "engine not auto-wired to KEV by default"; exit 1; }
          echo "$render" | grep -q 'kev.json' \
            || { echo "engine not pointed at the sidecar kev.json"; exit 1; }
          # Engine auto-wired to the EPSS file the same sidecar writes (JEF-243) — the
          # predictive exploitation axis alongside KEV.
          echo "$render" | grep -q 'PROTECTOR_EPSS_FILE' \
            || { echo "engine not auto-wired to EPSS by default"; exit 1; }
          echo "$render" | grep -q 'epss.csv' \
            || { echo "engine not pointed at the sidecar epss.csv"; exit 1; }
          # The retired CronJob/ConfigMap/feed-sync RBAC path must be GONE.
          if echo "$render" | grep -q 'kind: CronJob'; then
            echo "feed-sync CronJob still rendered (should be a sidecar now)"; exit 1
          fi
          if echo "$render" | grep -qE 'kev-snapshot|advisory-snapshot'; then
            echo "feed-sync ConfigMaps still rendered (should be an emptyDir now)"; exit 1
          fi
          # The NVD advisory feed was retired (JEF-242): KEV is the ONLY feed now, so no
          # advisory env and no advisory.json must render anywhere.
          if echo "$render" | grep -q 'PROTECTOR_ADVISORY_FILE'; then
            echo "advisory env rendered despite the advisory feed being retired (JEF-242)"; exit 1
          fi
          if echo "$render" | grep -q 'advisory.json'; then
            echo "advisory.json path rendered despite the advisory feed being retired (JEF-242)"; exit 1
          fi
          echo "ok"
      - name: Assert feedSync.enabled=false renders no sidecar and no auto-wire
        run: |
          # Air-gapped path: with the sidecar disabled, the chart must render NO feed-fetcher
          # container, NO shared feeds volume, and the engine must mount NO KEV / advisory file
          # env — nothing in the chart egresses.
          render=$(helm template protector charts/protector --namespace protector \
            --set feedSync.enabled=false)
          if echo "$render" | grep -q 'feed-fetcher'; then
            echo "feed-fetcher rendered despite feedSync.enabled=false"; exit 1
          fi
          if echo "$render" | grep -q 'PROTECTOR_KEV_FILE'; then
            echo "engine auto-wired KEV despite feedSync.enabled=false"; exit 1
          fi
          if echo "$render" | grep -q 'PROTECTOR_EPSS_FILE'; then
            echo "engine auto-wired EPSS despite feedSync.enabled=false"; exit 1
          fi
          if echo "$render" | grep -q 'PROTECTOR_ADVISORY_FILE'; then
            echo "engine auto-wired advisory despite feedSync.enabled=false"; exit 1
          fi
          echo "ok"
      - name: Assert the feed-fetcher sidecar is unprivileged and has NO apiserver access
        run: |
          # JEF-238 egress boundary: the sidecar is the ONLY container with egress. It must
          # run unprivileged (non-root, no privilege escalation, read-only rootfs, all caps
          # dropped) and — unlike the retired CronJob — make NO apiserver call: no dedicated
          # ServiceAccount, no Role/RoleBinding for it, no kubectl. It fetches the FULL public
          # KEV feed (the emptyDir has no ConfigMap size limit).
          render=$(helm template protector charts/protector --namespace protector)
          sc=$(echo "$render" | awk '/name: feed-fetcher/,/volumeMounts:/')
          echo "$sc" | grep -q 'runAsNonRoot: true' \
            || { echo "feed-fetcher not runAsNonRoot"; exit 1; }
          echo "$sc" | grep -q 'allowPrivilegeEscalation: false' \
            || { echo "feed-fetcher allows privilege escalation"; exit 1; }
          echo "$sc" | grep -q 'readOnlyRootFilesystem: true' \
            || { echo "feed-fetcher rootfs not read-only"; exit 1; }
          # No feed-sync RBAC / ServiceAccount must be templated for the sidecar (no apiserver).
          if echo "$render" | grep -qE 'kind: (CronJob|Role|RoleBinding)'; then
            echo "feed-fetcher should have no CronJob/Role/RoleBinding (no apiserver access)"; exit 1
          fi
          # The sidecar must not INVOKE kubectl (the retired CronJob applied ConfigMaps);
          # a passing mention of "bitnami/kubectl" in a rationale comment is fine, so match
          # the command forms only.
          if echo "$render" | grep -qE 'kubectl (apply|create|get|patch)'; then
            echo "feed-fetcher invokes kubectl (should make no apiserver call)"; exit 1
          fi
          # It must fetch the KEV feed and the EPSS feed (the two exploitation-intel feeds; the
          # advisory feed was retired, JEF-242).
          echo "$render" | grep -q 'known_exploited_vulnerabilities.json' \
            || { echo "feed-fetcher does not fetch the KEV feed"; exit 1; }
          echo "$render" | grep -q 'epss_scores-current.csv.gz' \
            || { echo "feed-fetcher does not fetch the EPSS feed (JEF-243)"; exit 1; }
          if echo "$render" | grep -q 'PROTECTOR_ADVISORY_FILE'; then
            echo "advisory env rendered despite the advisory feed being retired (JEF-242)"; exit 1
          fi
          echo "ok"
