{{- if .Values.serviceAccount.create }}
# The webhook makes no API calls (it only reads the AdmissionReview body). The
# mitigation engine, which shares this pod/SA, does: its read grants (and the optional
# armed-mode NetworkPolicy write) are in templates/clusterrole.yaml, bound only when
# engine.enabled.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "protector.serviceAccountName" . }}
  labels:
    {{- include "protector.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
