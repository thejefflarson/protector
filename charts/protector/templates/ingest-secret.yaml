{{- if and .Values.ingestAuth.enabled (not .Values.ingestAuth.existingSecret) }}
# Shared bearer token for the runtime/behavioral ingest (Fix A — ingest authn). The
# engine REQUIRES this token on the :9999 port (PROTECTOR_INGEST_TOKEN_FILE) and the
# agent PRESENTS it. App-layer AUTHENTICATION (who may post); the cluster's Linkerd
# mesh AUTHORIZATION (which identities may connect) is layered separately.
#
# The token is generated once and then kept stable across upgrades: `lookup` reuses the
# value already in the cluster, so a `helm upgrade` never rotates it out from under a
# running engine/agent (which would 401 the agent until both rolled). Provide your own
# via ingestAuth.existingSecret to manage rotation yourself.
{{- $name := include "protector.ingestSecretName" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $name) -}}
{{- $key := .Values.ingestAuth.secretKey -}}
{{- $token := "" -}}
{{- if and $existing $existing.data (index $existing.data $key) -}}
{{- $token = index $existing.data $key | b64dec -}}
{{- else -}}
{{- $token = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "protector.labels" . | nindent 4 }}
  annotations:
    # Keep the token even if the release is uninstalled with --keep-history workflows;
    # remove this annotation if you want it garbage-collected with the release.
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{ $key }}: {{ $token | b64enc | quote }}
{{- end }}
