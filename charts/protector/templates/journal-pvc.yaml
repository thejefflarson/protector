{{- if and .Values.engine.enabled .Values.engine.journal.enabled }}
# Persistent decision journal (JEF-141): survives engine restarts/reschedules so the
# dashboard repopulates immediately and the operator keeps a durable record of what
# protector decided. ReadWriteOnce — the engine is a singleton (replicaCount 1), and the
# Deployment uses the Recreate strategy so a rollout never contends for the volume.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "protector.fullname" . }}-journal
  labels:
    {{- include "protector.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.engine.journal.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.engine.journal.size | quote }}
{{- end }}
