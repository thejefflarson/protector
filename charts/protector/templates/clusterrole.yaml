{{- if and .Values.engine.enabled .Values.serviceAccount.create }}
# The mitigation engine reads observed cluster state to build its security graph.
# These are the reads ADR-0001 documents the engine needs — the webhook makes no API
# calls, but the engine shares the pod's ServiceAccount, so the grant lives here.
# Read-only by default; the NetworkPolicy *write* rule is added ONLY under `mode: enforce`
# (derived from the same posture that arms the cut, ADR-0021), so a `mode: audit` (shadow)
# install has zero write grants — the grant cannot drift from whether the engine actuates.
#
# NOTE: list/watch on secrets grants read of secret *data* at the API level, even though
# the engine only retains metadata. That is the sensitive read the engine's value rests
# on; scope the cluster or split namespaces if that's too broad.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "protector.fullname" . }}-engine
  labels:
    {{- include "protector.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  # trivy-operator reports — the in-cluster, zero-egress scanner signal (ADR-0003).
  # Read-only; all harmless if the CRDs are absent — the engine degrades to no data for
  # whichever report kind is missing. vulnerabilityreports is the CVE source (JEF-242);
  # exposedsecretreports / configauditreports / rbacassessmentreports are the
  # breach/exposure/misconfiguration signals (JEF-244).
  - apiGroups: ["aquasecurity.github.io"]
    resources:
      - "vulnerabilityreports"
      - "exposedsecretreports"
      - "configauditreports"
      - "rbacassessmentreports"
    verbs: ["get", "list", "watch"]
  # Linkerd authorization policy (a mesh-native reachability source). Read-only;
  # harmless if the CRDs are absent (the engine degrades to NetworkPolicy-only
  # reachability).
  - apiGroups: ["policy.linkerd.io"]
    resources: ["servers", "authorizationpolicies", "meshtlsauthentications"]
    verbs: ["get", "list", "watch"]
  {{- if eq .Values.mode "enforce" }}
  # mode: enforce — the network actuator creates/deletes its own (managed-by: protector)
  # additive, reversible objects to quarantine/sever a corroborated attack path. The
  # networkpolicy actuator (the default) writes NetworkPolicies; the adminnetworkpolicy
  # actuator (Cilium/Calico) additionally writes AdminNetworkPolicies (ADR-0007/0010).
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "delete", "patch"]
  {{- if eq .Values.engine.actuator "adminnetworkpolicy" }}
  - apiGroups: ["policy.networking.k8s.io"]
    resources: ["adminnetworkpolicies"]
    verbs: ["create", "delete", "patch"]
  {{- end }}
  {{- end }}
{{- end }}
