{{- /*
Feed-fetcher sidecar wiring (JEF-238). When feedSync is ON (the default), a native
sidecar (an initContainer with restartPolicy: Always) fetches the FULL public CISA KEV
catalogue into a shared emptyDir, and the engine reads that file from the SAME volume —
no ConfigMap, no CronJob (those hit the 1 MiB ConfigMap limit; raw CISA KEV is ~1.5 MiB).
The emptyDir has no size limit, so KEV is fetched in FULL. The engine itself stays
zero-egress (ADR-0015): only the sidecar egresses, to one public read-only feed. With
feedSync OFF, no sidecar and no shared volume render, and the feed env is dropped — the
air-gapped / manual-mount path (mount your own kev.json at the same path if you want
enrichment offline). KEV is the ONLY feed: the NVD advisory feed was retired (JEF-242,
redundant with Trivy's CVE metadata).
*/}}
{{- $feeds := and .Values.engine.enabled .Values.feedSync.enabled }}
{{- $feedsDir := include "protector.feedsDir" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "protector.fullname" . }}
  labels:
    {{- include "protector.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if and .Values.engine.enabled .Values.engine.journal.enabled }}
  # The journal PVC is ReadWriteOnce; a RollingUpdate would deadlock (the new pod can't
  # attach the volume while the old pod still holds it). Recreate: stop old, then start new.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "protector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "protector.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "protector.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $feeds }}
      # --- feed-fetcher sidecar (JEF-238) -------------------------------------------------
      # A NATIVE SIDECAR: an initContainer with restartPolicy: Always (k8s 1.29+ / the
      # cluster's k3s 1.36). Because it is a native sidecar it (a) starts and is given a
      # head start BEFORE the engine container, so the feed files usually exist by the time
      # the engine reads them, and (b) is auto-restarted for the pod's lifetime if it exits.
      #
      # EGRESS BOUNDARY. This is the ONLY container the chart gives network egress to. It
      # GETs ONE public, READ-ONLY feed URL (feedSync.kevUrl) and writes it to the shared
      # `feeds` emptyDir. It makes NO apiserver call (unlike the
      # retired JEF-228 CronJob — no RBAC, no ServiceAccount grant) and never reads or
      # transmits any cluster data. The engine stays ZERO-EGRESS (ADR-0015): it only reads
      # the resulting files. A curl-only image is used because bitnami/kubectl was pulled
      # from Docker Hub (cluster fork) and no apiserver client is needed here anymore.
      initContainers:
        - name: feed-fetcher
          image: "{{ .Values.feedSync.image.repository }}:{{ .Values.feedSync.image.tag }}"
          imagePullPolicy: {{ .Values.feedSync.image.pullPolicy }}
          # Native sidecar: keep it running and restart it alongside the engine.
          restartPolicy: Always
          securityContext:
            # cluster fix #166: the curl image's unprivileged user is uid 100 / gid 101.
            runAsUser: 100
            runAsGroup: 101
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            # Writes go only to the shared `feeds` volume and /tmp (both emptyDir), so the
            # root filesystem can stay read-only.
            readOnlyRootFilesystem: true
            capabilities:
              drop:
              - ALL
            seccompProfile:
              type: RuntimeDefault
          {{- with .Values.feedSync.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: KEV_URL
              value: {{ .Values.feedSync.kevUrl | quote }}
            - name: FEEDS_DIR
              value: {{ $feedsDir | quote }}
            - name: INTERVAL
              value: {{ .Values.feedSync.interval | quote }}
            - name: CURL_MAX_TIME
              value: {{ .Values.feedSync.curlMaxTimeSecs | quote }}
          command:
            - /bin/sh
            - -c
            # Fetch the KEV feed to a TEMP file, then atomically move it into place only on a
            # clean download — `set -eu` + curl `--fail` mean a feed outage leaves the
            # PREVIOUS good file untouched (never a half/empty overwrite) and the loop just
            # retries next tick.
            #
            # KEV is plain JSON, fetched in FULL (no ConfigMap size limit). It is the ONLY
            # feed: the NVD advisory feed was retired (JEF-242, redundant with Trivy's CVE
            # metadata). NO `jq` / NO transform / NO extra image. The engine never fetches
            # anything itself (zero egress, ADR-0015); it only reads this file.
            - |
              set -eu
              # Plain (uncompressed) feed → atomic move on a clean download.
              fetch() {
                name="$1"; url="$2"; dest="$FEEDS_DIR/$name"; tmp="$dest.tmp"
                echo "feed-fetcher: fetching $url -> $dest"
                if curl --fail --location --silent --show-error \
                     --retry 3 --retry-delay 5 \
                     --max-time "$CURL_MAX_TIME" \
                     --output "$tmp" "$url"; then
                  mv -f "$tmp" "$dest"
                  echo "feed-fetcher: updated $dest"
                else
                  rm -f "$tmp"
                  echo "feed-fetcher: WARN fetch failed for $url; keeping previous $dest" >&2
                fi
              }
              while :; do
                fetch kev.json "$KEV_URL"
                echo "feed-fetcher: sleeping $INTERVAL"
                sleep "$INTERVAL"
              done
          volumeMounts:
            - name: feeds
              mountPath: {{ $feedsDir | quote }}
            # readOnlyRootFilesystem is on, so give curl a writable scratch dir.
            - name: tmp
              mountPath: /tmp
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if and .Values.engine.enabled .Values.engine.dashboard.enabled }}
            - name: dashboard
              containerPort: {{ .Values.engine.dashboard.port }}
              protocol: TCP
            {{- end }}
            {{- if and .Values.engine.enabled .Values.engine.falco.enabled }}
            - name: falco-ingest
              containerPort: {{ .Values.engine.falco.port }}
              protocol: TCP
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: PROTECTOR_ADDR
              value: "0.0.0.0:{{ .Values.service.port }}"
            - name: PROTECTOR_TLS_CERT
              value: /etc/protector/tls/tls.crt
            - name: PROTECTOR_TLS_KEY
              value: /etc/protector/tls/tls.key
            # sigstore TUF cache — must be writable under readOnlyRootFilesystem,
            # so it points into the /tmp emptyDir below.
            - name: PROTECTOR_TUF_CACHE
              value: /tmp/sigstore
            - name: PROTECTOR_GATED_PREFIXES
              value: {{ .Values.signature.gatedPrefixes | quote }}
            - name: PROTECTOR_IDENTITY_REGEXP
              value: {{ .Values.signature.identityRegexp | quote }}
            - name: PROTECTOR_OIDC_ISSUER
              value: {{ .Values.signature.oidcIssuer | quote }}
            - name: PROTECTOR_ENFORCE_NAMESPACES
              value: {{ .Values.signature.enforceNamespaces | quote }}
            - name: PROTECTOR_ENFORCE_LABELS
              value: {{ .Values.signature.enforceLabels | quote }}
            - name: PROTECTOR_VERIFY_TIMEOUT
              value: {{ .Values.signature.verifyTimeout | quote }}
            - name: PROTECTOR_CACHE_TTL
              value: {{ .Values.signature.cacheTtl | quote }}
            - name: PROTECTOR_MAX_IMAGES
              value: {{ .Values.signature.maxImages | quote }}
            - name: PROTECTOR_MESH_ENFORCE_NAMESPACES
              value: {{ .Values.mesh.enforceNamespaces | quote }}
            - name: PROTECTOR_MESH_ENFORCE_LABELS
              value: {{ .Values.mesh.enforceLabels | quote }}
            {{- with .Values.registryAuth.secretName }}
            - name: PROTECTOR_REGISTRY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ . }}
                  key: {{ $.Values.registryAuth.usernameKey }}
            - name: PROTECTOR_REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ . }}
                  key: {{ $.Values.registryAuth.passwordKey }}
            {{- end }}
            {{- if .Values.registryAuth.dockerconfigSecret }}
            # Reuse a pull secret's creds to verify signatures of private gated images
            # (mounted as a file below). Empty by default (public images need none).
            - name: PROTECTOR_REGISTRY_AUTH_FILE
              value: /etc/protector/registry/config.json
            {{- end }}
            {{- if .Values.ingestAuth.enabled }}
            # Runtime/behavioral ingest authn (Fix A): the engine REQUIRES this bearer
            # token on :9999, rejecting forged observations. File-before-env; mounted
            # read-only from the ingest Secret below.
            - name: PROTECTOR_INGEST_TOKEN_FILE
              value: /etc/protector/ingest/token
            {{- end }}
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            {{- if .Values.otelEndpoint }}
            # Export traces + engine metrics over OTLP. Unset = stdout logs only
            # (zero egress, the default).
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otelEndpoint | quote }}
            {{- end }}
            {{- if .Values.engine.enabled }}
            # --- mitigation engine ---
            - name: PROTECTOR_ENGINE
              value: "on"
            # Empty = propose-only (shadow). The engine forces dry-run actuation while
            # this is empty, regardless of PROTECTOR_ENGINE_ACTUATOR. Arm classes only
            # after a journal review.
            - name: PROTECTOR_ENGINE_ENABLE
              value: {{ .Values.engine.enable | quote }}
            - name: PROTECTOR_ENGINE_ACTUATOR
              value: {{ .Values.engine.actuator | quote }}
            {{- if .Values.engine.dashboard.enabled }}
            - name: PROTECTOR_DASHBOARD_ADDR
              value: "0.0.0.0:{{ .Values.engine.dashboard.port }}"
            {{- end }}
            {{- if .Values.engine.falco.enabled }}
            - name: PROTECTOR_FALCO_ADDR
              value: "0.0.0.0:{{ .Values.engine.falco.port }}"
            {{- end }}
            {{- if $feeds }}
            # KEV catalogue file the feed-fetcher sidecar writes into the shared emptyDir
            # (JEF-238). FULL CISA KEV JSON — KevCatalog parses the canonical
            # {"vulnerabilities":[…]} shape. The engine never fetches KEV itself (zero
            # egress); it only reads this file, and degrades to "nothing known-exploited"
            # if it is missing/empty (the first-boot race before the sidecar's first fetch).
            - name: PROTECTOR_KEV_FILE
              value: {{ printf "%s/kev.json" $feedsDir | quote }}
            {{- end }}
            {{- with .Values.engine.model.endpoint }}
            # Local-first model (OpenAI-compatible). Unset = deterministic enumerator only.
            - name: PROTECTOR_ENGINE_MODEL
              value: {{ . | quote }}
            - name: PROTECTOR_ENGINE_MODEL_NAME
              value: {{ $.Values.engine.model.name | quote }}
            - name: PROTECTOR_ENGINE_MODEL_TIMEOUT_SECS
              value: {{ $.Values.engine.model.timeoutSecs | quote }}
            {{- end }}
            {{- with .Values.engine.notify.url }}
            # Breach notifier (ADR-0018). Unset = zero outbound calls (the default).
            - name: PROTECTOR_ENGINE_NOTIFY_URL
              value: {{ . | quote }}
            - name: PROTECTOR_ENGINE_NOTIFY_VERBOSE
              value: {{ $.Values.engine.notify.verbose | quote }}
            - name: PROTECTOR_ENGINE_NOTIFY_TIMEOUT_SECS
              value: {{ $.Values.engine.notify.timeoutSecs | quote }}
            {{- end }}
            {{- if .Values.engine.journal.enabled }}
            # Persistent decision journal (JEF-141) — survives restarts; the path is on
            # the journal PVC mounted below. Unset = in-memory only (graceful fallback).
            - name: PROTECTOR_ENGINE_JOURNAL_PATH
              value: {{ .Values.engine.journal.path | quote }}
            {{- end }}
            {{- else }}
            - name: PROTECTOR_ENGINE
              value: "off"
            {{- end }}
          volumeMounts:
            - name: tls
              mountPath: /etc/protector/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.ingestAuth.enabled }}
            - name: ingest-auth
              mountPath: /etc/protector/ingest
              readOnly: true
            {{- end }}
            {{- if and .Values.engine.enabled .Values.engine.journal.enabled }}
            - name: journal
              mountPath: {{ dir .Values.engine.journal.path | quote }}
            {{- end }}
            {{- if $feeds }}
            # The shared feeds emptyDir the sidecar writes (JEF-238), mounted READ-ONLY in
            # the engine — the engine only reads kev.json, never writes.
            - name: feeds
              mountPath: {{ $feedsDir | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.registryAuth.dockerconfigSecret }}
            - name: registry-auth
              mountPath: /etc/protector/registry
              readOnly: true
            {{- end }}
      volumes:
        - name: tls
          secret:
            secretName: {{ include "protector.servingCertName" . }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.ingestAuth.enabled }}
        # The ingest bearer token (Fix A), surfaced as a file the engine reads once.
        - name: ingest-auth
          secret:
            secretName: {{ include "protector.ingestSecretName" . }}
            items:
              - key: {{ .Values.ingestAuth.secretKey }}
                path: token
        {{- end }}
        {{- if and .Values.engine.enabled .Values.engine.journal.enabled }}
        - name: journal
          persistentVolumeClaim:
            claimName: {{ include "protector.fullname" . }}-journal
        {{- end }}
        {{- if $feeds }}
        # Shared scratch volume between the feed-fetcher sidecar (writer) and the engine
        # (reader) — JEF-238. emptyDir has no 1 MiB ConfigMap limit, so the FULL CISA KEV
        # JSON (~1.5 MiB) fits. Lives for the pod's lifetime; the sidecar re-fetches on its
        # interval and on restart.
        - name: feeds
          emptyDir: {}
        {{- end }}
        {{- if .Values.registryAuth.dockerconfigSecret }}
        # A pull secret's dockerconfigjson, surfaced as config.json so the cosign
        # verifier can read its creds (PROTECTOR_REGISTRY_AUTH_FILE).
        - name: registry-auth
          secret:
            secretName: {{ .Values.registryAuth.dockerconfigSecret }}
            items:
              - key: .dockerconfigjson
                path: config.json
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
