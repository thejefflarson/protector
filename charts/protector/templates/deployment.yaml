{{- /* ADR-0021 posture validation (defense-in-depth; the engine also refuses at startup):
  `mode` must be audit|enforce, and `mode: enforce` requires a non-empty enforceScope —
  there is no enforce-everywhere wildcard. */}}
{{- if not (or (eq .Values.mode "audit") (eq .Values.mode "enforce")) }}
{{- fail (printf "mode must be 'audit' or 'enforce', got %q" .Values.mode) }}
{{- end }}
{{- if and (eq .Values.mode "enforce") (not .Values.enforceScope.namespaces) (not .Values.enforceScope.labels) }}
{{- fail "mode: enforce requires a non-empty enforceScope (namespaces and/or labels) — there is no enforce-everywhere wildcard (ADR-0021)" }}
{{- end }}
{{- /*
Feed-fetcher sidecar wiring (JEF-238, JEF-243). When feedSync is ON (the default), a native
sidecar (an initContainer with restartPolicy: Always) fetches TWO public read-only feeds
into a shared emptyDir, and the engine reads those files from the SAME volume — no ConfigMap,
no CronJob (those hit the 1 MiB ConfigMap limit; raw CISA KEV is ~1.5 MiB):
  * the FULL public CISA KEV catalogue (kev.json) — known-exploited-NOW intel; and
  * the FIRST.org EPSS scores (epss.csv, fetched gzipped and gunzipped in place) — the
    PREDICTIVE exploitation probability per CVE (JEF-243).
The emptyDir has no size limit, so both feeds are fetched in FULL. The engine itself stays
zero-egress (ADR-0015): only the sidecar egresses, to public read-only feeds. With
feedSync OFF, no sidecar and no shared volume render, and the feed env is dropped — the
air-gapped / manual-mount path (mount your own kev.json / epss.csv at the same paths if you
want enrichment offline). The NVD advisory feed was retired (JEF-242, redundant with Trivy's
CVE metadata); KEV + EPSS are the two distinct exploitation axes alongside Trivy's CVSS.
*/}}
{{- $feeds := and .Values.engine.enabled .Values.feedSync.enabled }}
{{- $feedsDir := include "protector.feedsDir" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "protector.fullname" . }}
  labels:
    {{- include "protector.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if and .Values.engine.enabled .Values.engine.journal.enabled }}
  # The journal PVC is ReadWriteOnce; a RollingUpdate would deadlock (the new pod can't
  # attach the volume while the old pod still holds it). Recreate: stop old, then start new.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "protector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "protector.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "protector.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $feeds }}
      # --- feed-fetcher sidecar (JEF-238) -------------------------------------------------
      # A NATIVE SIDECAR: an initContainer with restartPolicy: Always (k8s 1.29+ / the
      # cluster's k3s 1.36). Because it is a native sidecar it (a) starts and is given a
      # head start BEFORE the engine container, so the feed files usually exist by the time
      # the engine reads them, and (b) is auto-restarted for the pod's lifetime if it exits.
      #
      # EGRESS BOUNDARY. This is the ONLY container the chart gives network egress to. It
      # GETs ONE public, READ-ONLY feed URL (feedSync.kevUrl) and writes it to the shared
      # `feeds` emptyDir. It makes NO apiserver call (unlike the
      # retired JEF-228 CronJob — no RBAC, no ServiceAccount grant) and never reads or
      # transmits any cluster data. The engine stays ZERO-EGRESS (ADR-0015): it only reads
      # the resulting files. A curl-only image is used because bitnami/kubectl was pulled
      # from Docker Hub (cluster fork) and no apiserver client is needed here anymore.
      initContainers:
        - name: feed-fetcher
          image: "{{ .Values.feedSync.image.repository }}:{{ .Values.feedSync.image.tag }}"
          imagePullPolicy: {{ .Values.feedSync.image.pullPolicy }}
          # Native sidecar: keep it running and restart it alongside the engine.
          restartPolicy: Always
          securityContext:
            # cluster fix #166: the curl image's unprivileged user is uid 100 / gid 101.
            runAsUser: 100
            runAsGroup: 101
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            # Writes go only to the shared `feeds` volume and /tmp (both emptyDir), so the
            # root filesystem can stay read-only.
            readOnlyRootFilesystem: true
            capabilities:
              drop:
              - ALL
            seccompProfile:
              type: RuntimeDefault
          {{- with .Values.feedSync.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: KEV_URL
              value: {{ .Values.feedSync.kevUrl | quote }}
            - name: EPSS_URL
              value: {{ .Values.feedSync.epssUrl | quote }}
            - name: FEEDS_DIR
              value: {{ $feedsDir | quote }}
            - name: INTERVAL
              value: {{ .Values.feedSync.interval | quote }}
            - name: CURL_MAX_TIME
              value: {{ .Values.feedSync.curlMaxTimeSecs | quote }}
          command:
            - /bin/sh
            - -c
            # Fetch each feed to a TEMP file, then atomically move it into place only on a
            # clean download — `set -eu` + curl `--fail` mean a feed outage leaves the
            # PREVIOUS good file untouched (never a half/empty overwrite) and the loop just
            # retries next tick.
            #
            # Two feeds, both fetched in FULL (no ConfigMap size limit): KEV (plain JSON,
            # known-exploited-NOW) and EPSS (gzipped CSV, the PREDICTIVE per-CVE probability —
            # JEF-243). NO `jq` / NO transform / NO extra image — `gunzip` is busybox-builtin in
            # the curl image. The NVD advisory feed was retired (JEF-242, redundant with Trivy's
            # CVE metadata). The engine never fetches anything itself (zero egress, ADR-0015);
            # it only reads these files.
            - |
              set -eu
              # Plain (uncompressed) feed → atomic move on a clean download.
              fetch() {
                name="$1"; url="$2"; dest="$FEEDS_DIR/$name"; tmp="$dest.tmp"
                echo "feed-fetcher: fetching $url -> $dest"
                if curl --fail --location --silent --show-error \
                     --retry 3 --retry-delay 5 \
                     --max-time "$CURL_MAX_TIME" \
                     --output "$tmp" "$url"; then
                  mv -f "$tmp" "$dest"
                  echo "feed-fetcher: updated $dest"
                else
                  rm -f "$tmp"
                  echo "feed-fetcher: WARN fetch failed for $url; keeping previous $dest" >&2
                fi
              }
              # Gzipped feed (EPSS) → download to a temp, gunzip to a second temp, atomic move
              # only when BOTH steps succeed (a truncated download won't gunzip, so the
              # previous good epss.csv is kept untouched).
              fetch_gz() {
                name="$1"; url="$2"; dest="$FEEDS_DIR/$name"
                gz="$dest.gz.tmp"; tmp="$dest.tmp"
                echo "feed-fetcher: fetching $url -> $dest (gz)"
                if curl --fail --location --silent --show-error \
                     --retry 3 --retry-delay 5 \
                     --max-time "$CURL_MAX_TIME" \
                     --output "$gz" "$url" \
                   && gunzip -c "$gz" > "$tmp"; then
                  mv -f "$tmp" "$dest"
                  rm -f "$gz"
                  echo "feed-fetcher: updated $dest"
                else
                  rm -f "$gz" "$tmp"
                  echo "feed-fetcher: WARN fetch failed for $url; keeping previous $dest" >&2
                fi
              }
              while :; do
                fetch kev.json "$KEV_URL"
                fetch_gz epss.csv "$EPSS_URL"
                echo "feed-fetcher: sleeping $INTERVAL"
                sleep "$INTERVAL"
              done
          volumeMounts:
            - name: feeds
              mountPath: {{ $feedsDir | quote }}
            # readOnlyRootFilesystem is on, so give curl a writable scratch dir.
            - name: tmp
              mountPath: /tmp
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if and .Values.engine.enabled .Values.engine.falco.enabled }}
            - name: falco-ingest
              containerPort: {{ .Values.engine.falco.port }}
              protocol: TCP
            {{- end }}
            {{- if and .Values.engine.enabled .Values.engine.dashboard.enabled }}
            - name: dashboard
              containerPort: {{ .Values.engine.dashboard.port }}
              protocol: TCP
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: PROTECTOR_ADDR
              value: "0.0.0.0:{{ .Values.service.port }}"
            - name: PROTECTOR_TLS_CERT
              value: /etc/protector/tls/tls.crt
            - name: PROTECTOR_TLS_KEY
              value: /etc/protector/tls/tls.key
            # sigstore TUF cache — must be writable under readOnlyRootFilesystem,
            # so it points into the /tmp emptyDir below.
            - name: PROTECTOR_TUF_CACHE
              value: /tmp/sigstore
            - name: PROTECTOR_GATED_PREFIXES
              value: {{ .Values.signature.gatedPrefixes | quote }}
            - name: PROTECTOR_IDENTITY_REGEXP
              value: {{ .Values.signature.identityRegexp | quote }}
            - name: PROTECTOR_OIDC_ISSUER
              value: {{ .Values.signature.oidcIssuer | quote }}
            # --- operating posture (ADR-0021): one `mode` + one `enforceScope` derive the
            # enforced scope of BOTH admission gates (signature + mesh) AND the engine cut.
            - name: PROTECTOR_MODE
              value: {{ .Values.mode | quote }}
            - name: PROTECTOR_ENFORCE_SCOPE_NAMESPACES
              value: {{ join "," .Values.enforceScope.namespaces | quote }}
            - name: PROTECTOR_ENFORCE_SCOPE_LABELS
              value: {{ include "protector.enforceScopeLabels" . | quote }}
            {{- if .Values.rekor.enabled }}
            # Rekor transparency-log lane (ADR-0020 §4): the one opt-in egress carve-out on
            # the signing lane. Off unless enabled here; timeouts/caps use code defaults.
            - name: PROTECTOR_REKOR_ENABLE
              value: "1"
            {{- with .Values.rekor.url }}
            - name: PROTECTOR_REKOR_URL
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.registryAuth.secretName }}
            - name: PROTECTOR_REGISTRY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ . }}
                  key: {{ $.Values.registryAuth.usernameKey }}
            - name: PROTECTOR_REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ . }}
                  key: {{ $.Values.registryAuth.passwordKey }}
            {{- end }}
            {{- if .Values.registryAuth.dockerconfigSecret }}
            # Reuse a pull secret's creds to verify signatures of private gated images
            # (mounted as a file below). Empty by default (public images need none).
            - name: PROTECTOR_REGISTRY_AUTH_FILE
              value: /etc/protector/registry/config.json
            {{- end }}
            {{- if .Values.ingestAuth.enabled }}
            # Runtime/behavioral ingest authn (Fix A): the engine REQUIRES this bearer
            # token on :9999, rejecting forged observations. File-before-env; mounted
            # read-only from the ingest Secret below.
            - name: PROTECTOR_INGEST_TOKEN_FILE
              value: /etc/protector/ingest/token
            {{- end }}
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            {{- if .Values.otelEndpoint }}
            # Export traces + engine metrics over OTLP. Unset = stdout logs only
            # (zero egress, the default).
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otelEndpoint | quote }}
            {{- end }}
            {{- if .Values.engine.enabled }}
            # --- mitigation engine ---
            # Arming is derived from the top-level `mode`/`enforceScope` (ADR-0021), NOT a
            # per-engine switch: `mode: enforce` arms the reversible network cut confined to
            # `enforceScope`; `mode: audit` (default) is dry-run (shadow). `actuator` only
            # selects the CNI mechanism used when it does actuate.
            - name: PROTECTOR_ENGINE_ACTUATOR
              value: {{ .Values.engine.actuator | quote }}
            {{- if .Values.engine.falco.enabled }}
            - name: PROTECTOR_FALCO_ADDR
              value: "0.0.0.0:{{ .Values.engine.falco.port }}"
            {{- end }}
            {{- if .Values.engine.dashboard.enabled }}
            # The read-only operator dashboard (ADR-0019). Zero-egress, in-cluster only —
            # reads the engine's output state and serves a server-rendered view. Reach it
            # through the cluster's own ingress/mesh; it terminates no TLS of its own.
            - name: PROTECTOR_DASHBOARD_ADDR
              value: "0.0.0.0:{{ .Values.engine.dashboard.port }}"
            - name: PROTECTOR_CLUSTER_LABEL
              value: {{ .Values.engine.dashboard.clusterLabel | quote }}
            {{- end }}
            {{- if $feeds }}
            # KEV catalogue file the feed-fetcher sidecar writes into the shared emptyDir
            # (JEF-238). FULL CISA KEV JSON — KevCatalog parses the canonical
            # {"vulnerabilities":[…]} shape. The engine never fetches KEV itself (zero
            # egress); it only reads this file, and degrades to "nothing known-exploited"
            # if it is missing/empty (the first-boot race before the sidecar's first fetch).
            - name: PROTECTOR_KEV_FILE
              value: {{ printf "%s/kev.json" $feedsDir | quote }}
            # EPSS scores file the same sidecar writes into the shared emptyDir (JEF-243).
            # The FIRST.org CSV (gunzipped in place) — EpssStore parses `cve,epss,percentile`
            # rows. The engine never fetches EPSS itself (zero egress); it only reads this
            # file, and degrades to "no exploit-prediction evidence" if it is missing/empty
            # (the first-boot race before the sidecar's first fetch).
            - name: PROTECTOR_EPSS_FILE
              value: {{ printf "%s/epss.csv" $feedsDir | quote }}
            {{- end }}
            {{- with .Values.engine.model.endpoint }}
            # Local-first model (OpenAI-compatible). Unset = deterministic enumerator only.
            - name: PROTECTOR_ENGINE_MODEL
              value: {{ . | quote }}
            - name: PROTECTOR_ENGINE_MODEL_NAME
              value: {{ $.Values.engine.model.name | quote }}
            {{- end }}
            {{- with .Values.engine.notify.url }}
            # Breach notifier (ADR-0018). Unset = zero outbound calls (the default).
            - name: PROTECTOR_ENGINE_NOTIFY_URL
              value: {{ . | quote }}
            - name: PROTECTOR_ENGINE_NOTIFY_VERBOSE
              value: {{ $.Values.engine.notify.verbose | quote }}
            {{- end }}
            {{- if .Values.engine.journal.enabled }}
            # Persistent decision journal (JEF-141) — survives restarts; the path is on
            # the journal PVC mounted below. Unset = in-memory only (graceful fallback).
            - name: PROTECTOR_ENGINE_JOURNAL_PATH
              value: {{ .Values.engine.journal.path | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: tls
              mountPath: /etc/protector/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.ingestAuth.enabled }}
            - name: ingest-auth
              mountPath: /etc/protector/ingest
              readOnly: true
            {{- end }}
            {{- if and .Values.engine.enabled .Values.engine.journal.enabled }}
            - name: journal
              mountPath: {{ dir .Values.engine.journal.path | quote }}
            {{- end }}
            {{- if $feeds }}
            # The shared feeds emptyDir the sidecar writes (JEF-238, JEF-243), mounted
            # READ-ONLY in the engine — the engine only reads kev.json / epss.csv, never writes.
            - name: feeds
              mountPath: {{ $feedsDir | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.registryAuth.dockerconfigSecret }}
            - name: registry-auth
              mountPath: /etc/protector/registry
              readOnly: true
            {{- end }}
      volumes:
        - name: tls
          secret:
            secretName: {{ include "protector.servingCertName" . }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.ingestAuth.enabled }}
        # The ingest bearer token (Fix A), surfaced as a file the engine reads once.
        - name: ingest-auth
          secret:
            secretName: {{ include "protector.ingestSecretName" . }}
            items:
              - key: {{ .Values.ingestAuth.secretKey }}
                path: token
        {{- end }}
        {{- if and .Values.engine.enabled .Values.engine.journal.enabled }}
        - name: journal
          persistentVolumeClaim:
            claimName: {{ include "protector.fullname" . }}-journal
        {{- end }}
        {{- if $feeds }}
        # Shared scratch volume between the feed-fetcher sidecar (writer) and the engine
        # (reader) — JEF-238, JEF-243. emptyDir has no 1 MiB ConfigMap limit, so the FULL CISA
        # KEV JSON (~1.5 MiB) and the FIRST.org EPSS CSV both fit. Lives for the pod's lifetime;
        # the sidecar re-fetches on its interval and on restart.
        - name: feeds
          emptyDir: {}
        {{- end }}
        {{- if .Values.registryAuth.dockerconfigSecret }}
        # A pull secret's dockerconfigjson, surfaced as config.json so the cosign
        # verifier can read its creds (PROTECTOR_REGISTRY_AUTH_FILE).
        - name: registry-auth
          secret:
            secretName: {{ .Values.registryAuth.dockerconfigSecret }}
            items:
              - key: .dockerconfigjson
                path: config.json
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
