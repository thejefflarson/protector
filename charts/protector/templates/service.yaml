apiVersion: v1
kind: Service
metadata:
  name: {{ include "protector.fullname" . }}
  labels:
    {{- include "protector.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "protector.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
