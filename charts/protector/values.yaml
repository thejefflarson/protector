# Default values for protector.
#
# SAFE BY DEFAULT. Out of the box this chart installs protector in its most
# conservative posture. Enforcement is TWO settings (ADR-0021): `mode` + `enforceScope`.
#
#   * mode: audit (DEFAULT)     everything observes & proposes; NOTHING blocks or acts.
#                               The signature + mesh webhooks audit everywhere (log +
#                               meter, never deny) and the engine runs in shadow
#                               (proposes cuts, applies none). This is the whole default.
#   * mode: enforce             + enforceScope {namespaces/labels}: arms ALL THREE
#                               enforcement surfaces together, confined to EXACTLY that
#                               scope — unsigned/regressed images denied, unmeshed Pods
#                               denied, and the engine applies its reversible network cut.
#                               The fail-closed enforcing webhook + the actuation RBAC are
#                               DERIVED from `enforceScope` (they can't drift). There is no
#                               per-surface toggle and NO enforce-everywhere wildcard.
#   * MODEL OPTIONAL            engine.model.endpoint empty    (deterministic enumerator only)
#   * AGENT OFF                 agent.enabled: false           (no eBPF DaemonSet)
#
# EGRESS POSTURE — read this. The ENGINE itself stays ZERO-EGRESS (ADR-0015): the
# security graph and evidence never leave the cluster, and it makes no breach-notify
# call, no OTLP export, and no live feed fetch (it only reads mounted files).
# As of JEF-238/JEF-243 the chart ships ONE component with network egress, ON BY DEFAULT: the
# feed-fetcher SIDECAR on the engine pod (feedSync.enabled: true). It is the SOLE
# component the chart grants egress to. It makes outbound GETs to PUBLIC, READ-ONLY feeds
# (the CISA KEV catalogue and the FIRST.org EPSS scores) and writes the results into a shared
# emptyDir the engine reads. It NEVER reads cluster state and NEVER transmits any cluster data
# outward — only the plain feed downloads leave. (This supersedes the JEF-228 feed-sync CronJob:
# raw CISA KEV is ~1.5 MiB, over the 1 MiB ConfigMap limit; an emptyDir holds the FULL data.)
#
#   * ENGINE ZERO-EGRESS preserved   engine never calls out (feeds are read from a volume)
#   * SIDECAR EGRESSES by default    feedSync.enabled: true   (public read-only feeds only)
#
# FULLY AIR-GAPPED / ZERO-EGRESS posture: set feedSync.enabled=false (no sidecar, nothing
# egresses) and, to keep enrichment offline, mount your own kev.json / epss.csv into the engine
# at /var/lib/protector/feeds.
#
# See the chart README for the exact opt-in/opt-out for each.

replicaCount: 1

# === OPERATING POSTURE (ADR-0021) — the two settings that govern enforcement ===
#
# mode: audit | enforce
#   audit   (DEFAULT) — observe & propose everywhere; nothing blocks or acts (shadow).
#   enforce — arm all three enforcement surfaces (signature webhook deny, mesh webhook
#             deny, engine live network-cut) confined to EXACTLY enforceScope below.
mode: audit
# The ONE enforced scope, honoured identically by all three surfaces and by the derived
# fail-closed webhook selector + actuation RBAC. Used only when mode: enforce.
#   namespaces — namespace NAMES to enforce (a Pod's namespace).
#   labels     — key: value POD labels; a Pod carrying one is enforced in ANY namespace
#                (labels behave like namespaces). There is NO enforce-everywhere wildcard:
#                mode: enforce with an empty enforceScope is refused at startup.
# Bake a scope in `audit` first (watch the would-deny findings), then flip to `enforce`.
#   enforceScope:
#     namespaces:
#     - payments
#     labels:
#       tier: prod
enforceScope:
  namespaces: []
  labels: {}

image:
  repository: ghcr.io/thejefflarson/protector
  pullPolicy: IfNotPresent
  # A specific, cosign-signed semver tag. Empty falls back to the chart's appVersion
  # (Chart.yaml), which tracks the latest signed release. Pin explicitly to override.
  tag: ""

# Pull secrets for the protector image. protector publishes to a PUBLIC ghcr repo,
# so the default needs none. Add a secret name here if you mirror the image into a
# private registry, e.g.:
#   imagePullSecrets:
#   - name: my-registry
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Extra pod annotations. EMPTY by default (no mesh assumption). If you run a service
# mesh, the only inbound caller of the webhook is the kube-apiserver, which is NOT in
# the mesh, so it serves its own cert-manager TLS regardless. Mesh users typically add:
#   podAnnotations:
#     linkerd.io/inject: enabled
#     config.linkerd.io/opaque-ports: "8443"
podAnnotations: {}
podLabels: {}

# Hardened: non-root, read-only root fs, no caps. The sigstore TUF cache needs a
# writable dir, supplied by an emptyDir at /tmp (see deployment.yaml), not the rootfs.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  # The apiserver dials this port over HTTPS; the container terminates TLS.
  port: 8443

# RAM-tight, arm64-friendly: a webhook that mostly idles with occasional signature
# verification (network I/O to the registry + Rekor) plus the async engine loop.
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Probes hit the HTTPS server; kubelet doesn't verify the cert for probes.
livenessProbe:
  httpGet:
    path: /healthz
    port: https
    scheme: HTTPS
readinessProbe:
  httpGet:
    path: /readyz
    port: https
    scheme: HTTPS

nodeSelector: {}
tolerations: []
affinity: {}

# --- signature policy (admission webhook) ---
signature:
  # Image-ref prefixes that MUST be signed; others (postgres, etc.) are out of scope.
  # Set this to YOUR first-party registry prefix.
  gatedPrefixes: "ghcr.io/thejefflarson/"
  # Trusted keyless signing identity + issuer (the cosign incantation). Start-anchored;
  # dots escaped so they match literally. Set to YOUR signing identity.
  identityRegexp: "^https://github\\.com/thejefflarson/"
  oidcIssuer: "https://token.actions.githubusercontent.com"
  # Whether unsigned/regressed gated images are DENIED (vs audited) is the cluster-wide
  # `mode` + `enforceScope` at the top of this file — not a per-webhook toggle (ADR-0021).
  # Verification tuning (timeout, cache TTL, max images per Pod) is buried with safe code
  # defaults; override via the PROTECTOR_VERIFY_TIMEOUT / _CACHE_TTL / _MAX_IMAGES env
  # escape hatches only if you must.

# --- Rekor transparency-log lane (ADR-0020 §4) ---
# The one opt-in EGRESS carve-out on the signing lane: corroborate per-repo signing
# baselines against the public transparency log and surface registry↔log divergence. OFF
# by default (fully zero-egress). Enable to make bounded, read-only queries to the public
# good log (or a self-hosted mirror via `url`). All other Rekor tuning (timeout, cache TTL,
# max response bytes) is buried with code defaults (PROTECTOR_REKOR_* env escape hatches).
rekor:
  enabled: false
  # Empty = the public Sigstore good log. Point at a self-hosted mirror to keep egress
  # in-cluster.
  url: ""

# Registry credentials for verifying signatures of PRIVATE gated images (signatures
# inherit repo visibility — without creds, a private-registry manifest fetch 401s).
# OFF by default (public images need none).
registryAuth:
  # A dockerconfigjson Secret already in this namespace; its creds are mounted as a
  # file and the verifier reads them. Empty = no registry auth.
  dockerconfigSecret: ""
  # Alternative: explicit username/password from a Secret's keys.
  secretName: ""
  usernameKey: username
  passwordKey: password

# --- webhook wiring ---
webhook:
  # Fail-safe for the AUDIT webhook (the broad one, below): a webhook outage must never
  # block API writes. Keep this Ignore — audit is observe-only, so failing it open loses
  # a little observability, not safety. This is also what makes AUDIT-EVERYWHERE safe (see
  # excludeNamespaces): because the audit webhook is fail-open AND audit never denies, it
  # can never block Pod CREATE anywhere — including kube-system or protector's own
  # namespace during bootstrap — even if the engine is down. The separate ENFORCING
  # webhook fails CLOSED (derived from `mode: enforce` + `enforceScope`).
  failurePolicy: Ignore
  # Keep the apiserver from stalling pod creation on a slow verify.
  timeoutSeconds: 5
  # AUDIT-EVERYWHERE BY DEFAULT. EMPTY ([]) means the audit webhook intercepts Pod CREATE
  # in EVERY namespace — including the control plane (kube-system / kube-public /
  # kube-node-lease), cert-manager, mesh/CD infra (linkerd / argocd), and protector's OWN
  # namespace. There is no default exclusion list anymore: audit observes the whole
  # cluster out of the box.
  #
  # WHY THIS IS SAFE (availability rationale): the audit webhook is fail-open
  # (failurePolicy: Ignore, above) and audit NEVER denies — it only logs + meters. So even
  # in kube-system, and even while the engine is restarting or unreachable, the apiserver
  # admits the Pod regardless. The webhook cannot deadlock the cluster or protector itself.
  # (Enforcement is a SEPARATE, fail-closed webhook DERIVED from `mode: enforce` +
  # `enforceScope` at the top of this file. Auditing a namespace does NOT enforce it.)
  #
  # OPT-OUT: list namespace names here to keep BOTH webhooks OFF them, e.g.:
  #   webhook.excludeNamespaces:
  #   - kube-system
  #   - cert-manager
  excludeNamespaces: []
  # --- fail-closed enforcement ---
  # A SECOND webhook, scoped to EXACTLY `enforceScope` (namespaces → namespaceSelector,
  # pod labels → objectSelector), fails CLOSED: if protector is down or a Pod spec is
  # oversized, Pod CREATE is BLOCKED in scope rather than admitting a possibly-unsigned
  # image. Its selector is DERIVED from `mode`/`enforceScope` (ADR-0021) — it can no
  # longer drift from what the gates actually enforce. The broad audit webhook above is
  # unaffected (still Ignore), so the rest of the cluster never blocks on a protector
  # outage. When mode: audit (the default), the enforcing webhook is scoped to a sentinel
  # label no namespace carries, so it renders but matches nothing and can never block.
  #
  # AVAILABILITY TRADEOFF: with failurePolicy Fail, an outage of the protector Deployment
  # (or the apiserver failing to reach it) STOPS new Pods from being created in the
  # enforced scope until protector recovers — including rollouts and HPA scale-ups. This
  # is the deliberate security posture for the scope you have decided MUST only run
  # signed/meshed workloads: fail safe, not fail open.
  enforcedFailurePolicy: Fail

# --- ingest authentication (security fix) ---
# The engine's runtime/behavioral ingest (the :9999 falco-ingest port) accepts
# observations that can make a proven attack chain ACTIONABLE (the corroborated-now
# signal). Any caller that can reach the port could otherwise forge those. This wires a
# shared bearer token that the engine requires and the agent presents — app-layer
# AUTHENTICATION, complementary to the cluster's Linkerd mesh AUTHORIZATION (which
# identities may connect). Both the engine Deployment and the agent DaemonSet read the
# token from a mounted file (PROTECTOR_INGEST_TOKEN_FILE), file-before-env.
#
# DEFAULT ON: a token is provisioned so the ingest is authenticated out of the box.
ingestAuth:
  enabled: true
  # Reference a Secret you manage instead of letting the chart generate one. It must
  # have a `token` key. Empty = the chart provisions a Secret with a random token
  # (stable across upgrades — Helm's lookup keeps the existing value; only the very
  # first install generates it).
  existingSecret: ""
  # The key within the Secret holding the token (chart-generated or existing).
  secretKey: token

# cert-manager serving cert for the webhook. The chart provisions a selfSigned Issuer
# + Certificate and lets cainjector fill the webhook caBundle — so a stock install
# needs only cert-manager present (no manual cert wrangling). ECDSA in PKCS#8 because
# protector's rustls server only loads PKCS#8 keys.
cert:
  # Set false ONLY if you manage the serving Secret + webhook caBundle yourself; the
  # Deployment still mounts the Secret named "<release>-tls".
  create: true
  duration: 2160h # 90d
  renewBefore: 360h # 15d

# protector at info; everything else at warn. sigstore is pinned to `error` because it
# logs a WARN for every UNSIGNED gated image (which protector already surfaces as its
# own audit finding) — keeping it would just be noise; genuine errors still come through.
logLevel: "protector=info,sigstore=error,warn"

# OTLP export of traces + engine metrics to an OpenTelemetry collector. EMPTY by
# default (zero egress — stdout logs only). Point at your in-cluster collector to opt in,
# e.g. "http://otel-collector.observability.svc.cluster.local:4318".
otelEndpoint: ""

# --- mitigation engine (the product) ---
# The async, out-of-band loop that watches observed cluster state, builds the security
# graph, proves ATT&CK attack chains, and — only under `mode: enforce` — auto-remediates
# within `enforceScope`. It uses the pod's OWN ServiceAccount for cluster reads
# (templates/clusterrole.yaml). Default posture is SHADOW: detect + propose, touch nothing.
# The engine is ARMED by the top-level `mode`/`enforceScope`, not a per-engine switch: on
# `mode: enforce` it applies its reversible network cut inside `enforceScope`, and the
# actuation RBAC grant (clusterrole.yaml) is derived from the same `mode` (ADR-0021).
engine:
  enabled: true
  # Live actuator MECHANISM (real infra — a per-cluster CNI choice, not a posture toggle;
  # ADR-0021). It selects WHICH additive, reversible object the cut renders when the engine
  # actuates under `mode: enforce`; in `mode: audit` the engine is always dry-run:
  #   networkpolicy      — quarantine the workload with a default-deny NetworkPolicy.
  #                        Works on any CNI that enforces NetworkPolicy. THE DEFAULT (ADR-0010).
  #   adminnetworkpolicy — surgical ANP edge-cut; needs a CNI implementing ANP
  #                        (Cilium/Calico). ADR-0007.
  #   dryrun             — log only; touches nothing (force shadow even under enforce).
  actuator: networkpolicy
  # Runtime-evidence ingest (the corroborated-now signal that makes a chain
  # live-actionable). A Falco/falcosidekick deployment POSTs alerts here; the optional
  # eBPF agent below also feeds this port. Enabling the listener is harmless on its own.
  falco:
    enabled: true
    port: 9999
  # Read-only operator dashboard (ADR-0019). A server-rendered, zero-egress view of the
  # engine's output state (findings, verdicts, coverage). It reads only state the engine
  # already holds and NEVER mutates it, so it is strictly observational. It terminates no
  # TLS of its own — expose it through the cluster's ingress/mesh. ClusterIP service below.
  dashboard:
    enabled: true
    port: 8080
    # The cluster label shown in the dashboard's status strip.
    clusterLabel: cluster
  # Two exploitation-intel feeds drive the engine's exploit intel + model reasoning
  # (ADR-0015): the CISA KEV catalogue (actively-exploited CVEs, known NOW) and the FIRST.org
  # EPSS scores (the PREDICTIVE per-CVE exploitation probability — JEF-243). The engine NEVER
  # fetches either over the network (zero egress) — it only READS files from a shared
  # emptyDir. By default the feed-fetcher SIDECAR (feedSync below, ON by default) fetches both
  # in FULL into that volume and the engine auto-reads them at /var/lib/protector/feeds/kev.json
  # (PROTECTOR_KEV_FILE) and /var/lib/protector/feeds/epss.csv (PROTECTOR_EPSS_FILE), both set
  # automatically. No further config. (The NVD advisory feed was retired in JEF-242 — redundant
  # with Trivy; KEV + EPSS are the two distinct exploitation axes alongside Trivy's CVSS.)
  #
  # AIR-GAPPED: set feedSync.enabled=false (no sidecar, no egress) and, to keep enrichment
  # offline, mount your own kev.json / epss.csv into the engine at those same paths.
  # Local-first model for the adjudicator/hypothesis proposer (OpenAI-compatible chat
  # endpoint). OPTIONAL and OFF by default — the engine runs the deterministic enumerator
  # only with no model. Point at an IN-CLUSTER model so the graph never leaves the cluster
  # (the adjudicator's veto is load-bearing under `mode: enforce`, so set this before you
  # flip). A configured endpoint also enables model-backed hypothesis proposal (ADR-0021:
  # derived from "a model is configured", no separate opt-in). Point IN-CLUSTER so the
  # graph never leaves. Example: "http://ollama.<ns>.svc.cluster.local:11434/v1/chat/completions".
  # Per-call model timeout is buried with a safe code default (PROTECTOR_ENGINE_MODEL_TIMEOUT_SECS).
  model:
    endpoint: ""
    name: ""
  # Breach notifier (ADR-0018): an operator-configured webhook URL the engine POSTs a
  # redacted breach summary to. OFF by default (zero egress — no outbound calls). Opt in
  # by setting a URL; verbose adds non-redacted detail (only for a trusted sink).
  # (The POST timeout is buried with a safe code default — PROTECTOR_ENGINE_NOTIFY_TIMEOUT_SECS.)
  notify:
    url: ""
    verbose: false
  # Decision journal (JEF-141): an append-only, size-rotated record of every breach
  # decision + mitigation apply/revert, on a PERSISTENT volume so it survives a restart.
  # Stays in-cluster (zero egress). Disable to fall back to in-memory only (degrades
  # gracefully — the engine never crashes on a missing path).
  journal:
    enabled: true
    # File the engine appends to; it rotates to <path>.1 in the same dir (~2 MiB total).
    # The dir is the PVC mount; must be writable (fsGroup 65532 owns it).
    path: /var/lib/protector/journal/decisions.jsonl
    # Persistent claim so the journal survives pod restart/reschedule. RWO (replicaCount 1).
    size: 256Mi
    # "" = the cluster's default StorageClass.
    storageClass: ""

# --- behavioral telemetry agent (ADR-0014) ---
# protector's first-party eBPF collector (agent/) — a DaemonSet on every node that
# observes what workloads ACTUALLY do (connections, secret reads, exec) and POSTs them
# to the engine's behavioral ingest. Passive, read-only — it observes, never blocks.
#
# OFF by default: it needs the protector-agent image and the eBPF probes load-tested on
# your kernel (see agent/README.md). When enabled it runs in SHADOW — the signals enrich
# the model + the engine's output state. Corroboration is per-objective (ADR-0014): an
# alerting signal corroborates any chain, and the agent's own behaviors each corroborate
# the objective class whose ATT&CK tactic they evidence (internet egress → exfil, secret
# read → credential-access, vuln-library load / notable exec → foothold).
agent:
  enabled: false
  image:
    repository: ghcr.io/thejefflarson/protector-agent
    # Empty falls back to the chart's appVersion (Chart.yaml). Pin explicitly to override.
    tag: ""
    pullPolicy: IfNotPresent
  # Extra pod annotations for the agent DaemonSet. EMPTY by default. If you run a mesh
  # and the engine's ingest port enforces mTLS, mesh the agent here, e.g.:
  #   podAnnotations:
  #     linkerd.io/inject: enabled
  podAnnotations: {}
  # Rolling-update surge for the DaemonSet. The k8s default (maxUnavailable:1,
  # maxSurge:0) waits for each node's old pod to terminate before starting the new one,
  # so a single stuck/cordoned node stalls the whole roll and drops runtime coverage to
  # zero fleet-wide. maxSurge:1 brings a replacement pod up on healthy nodes without first
  # tearing down the old one, so the roll proceeds past a bad node — coverage never dips
  # below the running fleet during an upgrade. Set 0 to restore the default in-place roll.
  maxSurge: 1
  # RAM-tight for arm64: in-kernel aggregation is cheap; userspace is a thin batcher.
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # Narrowest caps that load eBPF + create ring-buffer maps on a stock kernel. Still runs
  # as uid 0 (BPF caps aren't effective for a non-root uid even when granted) but drops
  # everything else — read-only observe. Flip privileged: true only to bisect a regression.
  privileged: false
  capabilities:
  - BPF
  - PERFMON
  - SYS_ADMIN
  - SYS_RESOURCE
  nodeSelector: {}
  affinity: {}
  # Run on every node, including tainted/control-plane ones.
  tolerations:
  - operator: Exists

# --- feed-fetcher sidecar (JEF-238, JEF-243) ---
# ON BY DEFAULT (feedSync.enabled: true). A co-located feed-fetcher SIDECAR (a native
# sidecar = an initContainer with restartPolicy: Always) on the engine pod fetches the
# FULL public CISA KEV catalogue AND the FIRST.org EPSS scores into a shared emptyDir the
# engine reads — so both exploitation-intel feeds are fresh out of the box with no operator
# syncing them by hand and no further config.
#
# TWO FEEDS, TWO EXPLOITATION AXES. The NVD advisory feed was retired (JEF-242): it was
# redundant with Trivy's CVE metadata (title ~ summary, fixedVersion ~ fix_ref) and had a
# poor hit-rate against the base-image CVEs Trivy finds. What stays are the two SIGNALS Trivy
# does NOT supply: KEV's `exploited_in_wild` (known-exploited NOW) and EPSS's per-CVE
# probability (PREDICTIVE — likely-to-be-exploited next). Together with Trivy's CVSS (static
# severity) they are the three distinct axes the breach model weighs (ADR-0016).
#
# WHY A SIDECAR, NOT A CONFIGMAP (supersedes JEF-228). Raw CISA KEV JSON is ~1.5 MiB,
# over the 1 MiB ConfigMap limit (the CronJob path had to lossily strip it to CVE-IDs); the
# EPSS feed is similarly large. An emptyDir has NO size limit, so the sidecar fetches both in
# FULL (gunzipping EPSS in place) and the engine reads the complete files.
#
# EGRESS POSTURE — READ THIS. The sidecar is the ONE container the chart gives network
# egress to, and it is ON by default. It GETs TWO PUBLIC, READ-ONLY feed URLs (kevUrl, epssUrl)
# and writes them to the shared emptyDir. Unlike the retired CronJob it makes NO apiserver call
# (no ServiceAccount grant, no RBAC). It NEVER reads cluster state and NEVER transmits any
# cluster data outward — the only bytes that leave are the plain GETs for the public KEV/EPSS
# feeds. The ENGINE itself stays ZERO-EGRESS (ADR-0015): it only reads the resulting files
# and makes no feed network call of its own.
#
# TRADEOFF / FRAMING: engine zero-egress is preserved; the sidecar egresses to the public
# KEV + EPSS feeds by default. TO RESTORE A FULLY AIR-GAPPED / ZERO-EGRESS POSTURE, set
# feedSync.enabled=false (then NOTHING in the chart egresses); to keep enrichment offline,
# mount your own kev.json / epss.csv into the engine at /var/lib/protector/feeds yourself. With
# the sidecar disabled, no sidecar/volume/feed-env renders.
feedSync:
  enabled: true
  # The public, READ-ONLY feed sources (both fetched in FULL — the emptyDir has no ConfigMap
  # size limit):
  #   * kevUrl  — the canonical CISA KEV catalogue (plain JSON, known-exploited NOW); and
  #   * epssUrl — the FIRST.org EPSS scores (gzipped CSV, the PREDICTIVE per-CVE exploitation
  #     probability — JEF-243). The sidecar gunzips it in place (busybox gunzip).
  kevUrl: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
  epssUrl: "https://epss.cyentia.com/epss_scores-current.csv.gz"
  # Re-fetch interval (a `sleep` arg: e.g. "12h", "6h", "30m"). KEV changes at most daily and
  # EPSS is re-scored daily; 12h keeps both fresh without spending much egress.
  interval: "12h"
  # The fetcher image. A CURL-ONLY image (no apiserver client needed anymore — and
  # bitnami/kubectl was pulled from Docker Hub, cluster fork; busybox `gunzip` decompresses
  # the EPSS feed). Pinned by tag. The image's unprivileged user is uid 100 / gid 101 (set in
  # the sidecar securityContext).
  image:
    repository: curlimages/curl
    tag: "8.11.1"
    pullPolicy: IfNotPresent
  # Per-feed download wall (s) for curl --max-time, bounding a slow/hung feed host.
  curlMaxTimeSecs: 120
  # Tiny: a curl loop writing two small files.
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
