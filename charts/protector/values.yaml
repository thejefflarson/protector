# Default values for protector.
#
# SAFE BY DEFAULT. Out of the box this chart installs protector in its most
# conservative posture, and every step toward ACTING ON the cluster is a single,
# documented value change — never default-on:
#
#   * Webhook AUDIT-ONLY        signature.enforceNamespaces / mesh.enforceNamespaces empty
#   * Engine SHADOW             engine.enable empty            (propose-only, touches nothing)
#   * Actuator DRY-RUN          engine.actuator: dryrun        (no cluster writes even if armed)
#   * MODEL OPTIONAL            engine.model.endpoint empty    (deterministic enumerator only)
#   * AGENT OFF                 agent.enabled: false           (no eBPF DaemonSet)
#
# EGRESS POSTURE — read this. The ENGINE itself stays ZERO-EGRESS (ADR-0015): the
# security graph and evidence never leave the cluster, and it makes no breach-notify
# call, no OTLP export, and no live advisory/KEV fetch (it only reads mounted files).
# As of JEF-238 the chart ships ONE component with network egress, ON BY DEFAULT: the
# feed-fetcher SIDECAR on the engine pod (feedSync.enabled: true). It is the SOLE
# component the chart grants egress to. It makes outbound GETs to PUBLIC, READ-ONLY
# CVE/KEV feeds and writes the result into a shared emptyDir the engine reads. It NEVER
# reads cluster state and NEVER transmits any cluster data outward — only the plain feed
# downloads leave. (This supersedes the JEF-228 feed-sync CronJob: raw CISA KEV is
# ~1.5 MiB, over the 1 MiB ConfigMap limit; an emptyDir holds the FULL data.)
#
#   * ENGINE ZERO-EGRESS preserved   engine never calls out (feeds are read from a volume)
#   * SIDECAR EGRESSES by default    feedSync.enabled: true   (public read-only feeds only)
#
# FULLY AIR-GAPPED / ZERO-EGRESS posture: set feedSync.enabled=false (no sidecar, nothing
# egresses) and, to keep enrichment offline, mount your own kev.json / advisory.json into
# the engine at /var/lib/protector/feeds.
#
# See the chart README for the exact opt-in/opt-out for each.

replicaCount: 1

image:
  repository: ghcr.io/thejefflarson/protector
  pullPolicy: IfNotPresent
  # A specific, cosign-signed semver tag. Empty falls back to the chart's appVersion
  # (Chart.yaml), which tracks the latest signed release. Pin explicitly to override.
  tag: ""

# Pull secrets for the protector image. protector publishes to a PUBLIC ghcr repo,
# so the default needs none. Add a secret name here if you mirror the image into a
# private registry, e.g.:
#   imagePullSecrets:
#   - name: my-registry
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Extra pod annotations. EMPTY by default (no mesh assumption). If you run a service
# mesh, the only inbound caller of the webhook is the kube-apiserver, which is NOT in
# the mesh, so it serves its own cert-manager TLS regardless. Mesh users typically add:
#   podAnnotations:
#     linkerd.io/inject: enabled
#     config.linkerd.io/opaque-ports: "8443"
podAnnotations: {}
podLabels: {}

# Hardened: non-root, read-only root fs, no caps. The sigstore TUF cache needs a
# writable dir, supplied by an emptyDir at /tmp (see deployment.yaml), not the rootfs.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  # The apiserver dials this port over HTTPS; the container terminates TLS.
  port: 8443

# RAM-tight, arm64-friendly: a webhook that mostly idles with occasional signature
# verification (network I/O to the registry + Rekor) plus the async engine loop.
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Probes hit the HTTPS server; kubelet doesn't verify the cert for probes.
livenessProbe:
  httpGet:
    path: /healthz
    port: https
    scheme: HTTPS
readinessProbe:
  httpGet:
    path: /readyz
    port: https
    scheme: HTTPS

nodeSelector: {}
tolerations: []
affinity: {}

# --- signature policy (admission webhook) ---
signature:
  # Image-ref prefixes that MUST be signed; others (postgres, etc.) are out of scope.
  # Set this to YOUR first-party registry prefix.
  gatedPrefixes: "ghcr.io/thejefflarson/"
  # Trusted keyless signing identity + issuer (the cosign incantation). Start-anchored;
  # dots escaped so they match literally. Set to YOUR signing identity.
  identityRegexp: "^https://github\\.com/thejefflarson/"
  oidcIssuer: "https://token.actions.githubusercontent.com"
  # Enforcement is OPT-IN: audit everywhere by default (log + meter, never block).
  # Add namespaces here to start DENYING unsigned gated images there, one slice at a
  # time once that namespace's audit log is clean. Empty = audit-only. There is no
  # enforce-everywhere wildcard by design.
  enforceNamespaces: ""
  # Comma-separated key=value pod labels that opt a Pod into signature enforcement
  # regardless of namespace (e.g. "tier=prod").
  enforceLabels: ""
  # Per-image verification timeout (s) — bounds a slow/hung registry.
  verifyTimeout: 5
  # Verdict cache TTL (s) — re-verifies a tag past this, bounding mutable-tag TOCTOU.
  cacheTtl: 300
  # Max distinct gated images verified per Pod (DoS amplification guard).
  maxImages: 32

# --- mesh-injection policy (admission webhook) ---
mesh:
  # Namespaces where unmeshed Pods are DENIED. Audit everywhere by default (empty).
  # Leave empty until a namespace's audit log is clean.
  enforceNamespaces: ""
  # Comma-separated key=value pod labels that opt a Pod into mesh enforcement.
  enforceLabels: ""

# Registry credentials for verifying signatures of PRIVATE gated images (signatures
# inherit repo visibility — without creds, a private-registry manifest fetch 401s).
# OFF by default (public images need none).
registryAuth:
  # A dockerconfigjson Secret already in this namespace; its creds are mounted as a
  # file and the verifier reads them. Empty = no registry auth.
  dockerconfigSecret: ""
  # Alternative: explicit username/password from a Secret's keys.
  secretName: ""
  usernameKey: username
  passwordKey: password

# --- webhook wiring ---
webhook:
  # Fail-safe for the AUDIT webhook (the broad one, below): a webhook outage must never
  # block API writes. Keep this Ignore — audit is observe-only, so failing it open loses
  # a little observability, not safety. This is also what makes AUDIT-EVERYWHERE safe (see
  # excludeNamespaces): because the audit webhook is fail-open AND audit never denies, it
  # can never block Pod CREATE anywhere — including kube-system or protector's own
  # namespace during bootstrap — even if the engine is down. The separate ENFORCING
  # webhook fails CLOSED (see enforcedNamespaceSelector).
  failurePolicy: Ignore
  # Keep the apiserver from stalling pod creation on a slow verify.
  timeoutSeconds: 5
  # AUDIT-EVERYWHERE BY DEFAULT. EMPTY ([]) means the audit webhook intercepts Pod CREATE
  # in EVERY namespace — including the control plane (kube-system / kube-public /
  # kube-node-lease), cert-manager, mesh/CD infra (linkerd / argocd), and protector's OWN
  # namespace. There is no default exclusion list anymore: audit observes the whole
  # cluster out of the box.
  #
  # WHY THIS IS SAFE (availability rationale): the audit webhook is fail-open
  # (failurePolicy: Ignore, above) and audit NEVER denies — it only logs + meters. So even
  # in kube-system, and even while the engine is restarting or unreachable, the apiserver
  # admits the Pod regardless. The webhook cannot deadlock the cluster or protector itself.
  # (Enforcement is a SEPARATE, opt-in, fail-closed webhook scoped by label — see
  # enforcedNamespaceSelector. Auditing a namespace does NOT enforce it.)
  #
  # OPT-OUT: list namespace names here to keep BOTH webhooks OFF them, e.g.:
  #   webhook.excludeNamespaces:
  #   - kube-system
  #   - cert-manager
  excludeNamespaces: []
  # --- fail-closed enforcement (security fix) ---
  # A SECOND webhook, scoped to namespaces that have opted into signature/mesh
  # ENFORCEMENT, fails CLOSED: if protector is down or a Pod spec is oversized, Pod
  # CREATE is BLOCKED in those namespaces rather than admitting a possibly-unsigned
  # image. The broad audit webhook above is unaffected (still Ignore), so the rest of
  # the cluster never blocks on a protector outage.
  #
  # AVAILABILITY TRADEOFF: with failurePolicy Fail, an outage of the protector
  # Deployment (or the apiserver failing to reach it) STOPS new Pods from being created
  # in the selected namespaces until protector recovers — including rollouts and HPA
  # scale-ups. This is the deliberate security posture for namespaces you have decided
  # MUST only run signed/meshed workloads: fail safe, not fail open. Keep the selector
  # tight and align it with signature.enforceNamespaces / mesh.enforceNamespaces.
  enforcedFailurePolicy: Fail
  # Label selector identifying the enforced namespaces. EMPTY by default ({}) so a stock
  # install ships with NO fail-closed blast radius: when this selector is empty the
  # enforcing webhook is scoped to a sentinel label no namespace carries, so it renders
  # but matches nothing and can never block. Opt a namespace in by labeling it, e.g.:
  #   kubectl label namespace payments protector.dev/enforce=true
  # then set:
  #   webhook.enforcedNamespaceSelector:
  #     matchLabels:
  #       protector.dev/enforce: "true"
  enforcedNamespaceSelector: {}

# --- ingest authentication (security fix) ---
# The engine's runtime/behavioral ingest (the :9999 falco-ingest port) accepts
# observations that can make a proven attack chain ACTIONABLE (the corroborated-now
# signal). Any caller that can reach the port could otherwise forge those. This wires a
# shared bearer token that the engine requires and the agent presents — app-layer
# AUTHENTICATION, complementary to the cluster's Linkerd mesh AUTHORIZATION (which
# identities may connect). Both the engine Deployment and the agent DaemonSet read the
# token from a mounted file (PROTECTOR_INGEST_TOKEN_FILE), file-before-env.
#
# DEFAULT ON: a token is provisioned so the ingest is authenticated out of the box.
ingestAuth:
  enabled: true
  # Reference a Secret you manage instead of letting the chart generate one. It must
  # have a `token` key. Empty = the chart provisions a Secret with a random token
  # (stable across upgrades — Helm's lookup keeps the existing value; only the very
  # first install generates it).
  existingSecret: ""
  # The key within the Secret holding the token (chart-generated or existing).
  secretKey: token

# cert-manager serving cert for the webhook. The chart provisions a selfSigned Issuer
# + Certificate and lets cainjector fill the webhook caBundle — so a stock install
# needs only cert-manager present (no manual cert wrangling). ECDSA in PKCS#8 because
# protector's rustls server only loads PKCS#8 keys.
cert:
  # Set false ONLY if you manage the serving Secret + webhook caBundle yourself; the
  # Deployment still mounts the Secret named "<release>-tls".
  create: true
  duration: 2160h # 90d
  renewBefore: 360h # 15d

# protector at info; everything else at warn. sigstore is pinned to `error` because it
# logs a WARN for every UNSIGNED gated image (which protector already surfaces as its
# own audit finding) — keeping it would just be noise; genuine errors still come through.
logLevel: "protector=info,sigstore=error,warn"

# OTLP export of traces + engine metrics to an OpenTelemetry collector. EMPTY by
# default (zero egress — stdout logs only). Point at your in-cluster collector to opt in,
# e.g. "http://otel-collector.observability.svc.cluster.local:4318".
otelEndpoint: ""

# --- mitigation engine (the product) ---
# The async, out-of-band loop that watches observed cluster state, builds the security
# graph, proves ATT&CK attack chains, and (only once a class is armed) auto-remediates.
# It uses the pod's OWN ServiceAccount for cluster reads (templates/clusterrole.yaml).
# Default posture is SHADOW: detect + propose, touch nothing.
engine:
  enabled: true
  # ARMING SWITCH. Action classes auto-applied when a chain is proven AND
  # live-corroborated AND adjudicator-confirmed (comma list: network,rbac,mount,identity).
  # EMPTY = propose-only (shadow) — the engine forces the dry-run actuator regardless of
  # `actuator` below whenever this is empty. Only `network` is live-actuatable today.
  # `escape` is never enableable. Arm ONE class only after a journal review (ADR/JEF-50).
  enable: ""
  # Live actuator mechanism, used ONLY when a class is armed via `enable`:
  #   dryrun             — log only; touches nothing. THE SAFE DEFAULT.
  #   networkpolicy      — quarantine the workload with a default-deny NetworkPolicy.
  #                        Works on any CNI that enforces NetworkPolicy. ADR-0010.
  #   adminnetworkpolicy — surgical ANP edge-cut; needs a CNI implementing ANP
  #                        (Cilium/Calico). ADR-0007.
  # Left as dryrun by default so arming a class still writes nothing until you also
  # choose a live mechanism here — a deliberate two-step to live actuation.
  actuator: dryrun
  # Grant the SA create/delete on NetworkPolicies so a live actuator can apply isolation.
  # Keep false in shadow; turn on together with a live `actuator` + `enable: network`.
  actuationRBAC: false
  # Read-only findings dashboard (HTML at /, JSON at /findings) — surfaces the
  # latent-foothold proposals a human acts on. ClusterIP only (no ingress created).
  dashboard:
    enabled: true
    port: 8080
  # Runtime-evidence ingest (the corroborated-now signal that makes a chain
  # live-actionable). A Falco/falcosidekick deployment POSTs alerts here; the optional
  # eBPF agent below also feeds this port. Enabling the listener is harmless on its own.
  falco:
    enabled: true
    port: 9999
  # CISA KEV catalogue (actively-exploited CVEs) and advisory snapshot (ADR-0015) feed the
  # engine's exploit intel + model reasoning. The engine NEVER fetches these over the
  # network (zero egress) — it only READS files from a shared emptyDir. By default the
  # feed-fetcher SIDECAR (feedSync below, ON by default) fetches them in FULL into that
  # volume and the engine auto-reads them at /var/lib/protector/feeds/{kev,advisory}.json
  # (PROTECTOR_KEV_FILE / PROTECTOR_ADVISORY_FILE, set automatically). No further config.
  #
  # AIR-GAPPED: set feedSync.enabled=false (no sidecar, no egress) and, to keep enrichment
  # offline, mount your own kev.json / advisory.json into the engine at that same path.
  # Local-first model for the adjudicator/hypothesis proposer (OpenAI-compatible chat
  # endpoint). OPTIONAL and OFF by default — the engine runs the deterministic enumerator
  # only with no model. Point at an IN-CLUSTER model so the graph never leaves the cluster
  # (the adjudicator's veto is load-bearing once a class is armed, so set this before
  # arming `network`). Example: "http://ollama.<ns>.svc.cluster.local:11434/v1/chat/completions".
  model:
    endpoint: ""
    name: ""
    # Per-call model timeout (s). CPU-only inference is slow; generous headroom keeps a
    # burst of adjudications from surfacing as `model unavailable`. Never blocks the
    # dashboard (verdicts are cached per entry and carried forward).
    timeoutSecs: 1200
  # Breach notifier (ADR-0018): an operator-configured webhook URL the engine POSTs a
  # redacted breach summary to. OFF by default (zero egress — no outbound calls). Opt in
  # by setting a URL; verbose adds non-redacted detail (only for a trusted sink).
  notify:
    url: ""
    verbose: false
    timeoutSecs: 10
  # Decision journal (JEF-141): an append-only, size-rotated record of every breach
  # decision + mitigation apply/revert, on a PERSISTENT volume so it survives a restart.
  # Stays in-cluster (zero egress). Disable to fall back to in-memory only (degrades
  # gracefully — the engine never crashes on a missing path).
  journal:
    enabled: true
    # File the engine appends to; it rotates to <path>.1 in the same dir (~2 MiB total).
    # The dir is the PVC mount; must be writable (fsGroup 65532 owns it).
    path: /var/lib/protector/journal/decisions.jsonl
    # Persistent claim so the journal survives pod restart/reschedule. RWO (replicaCount 1).
    size: 256Mi
    # "" = the cluster's default StorageClass.
    storageClass: ""

# --- behavioral telemetry agent (ADR-0014) ---
# protector's first-party eBPF collector (agent/) — a DaemonSet on every node that
# observes what workloads ACTUALLY do (connections, secret reads, exec) and POSTs them
# to the engine's behavioral ingest. Passive, read-only — it observes, never blocks.
#
# OFF by default: it needs the protector-agent image and the eBPF probes load-tested on
# your kernel (see agent/README.md). When enabled it runs in SHADOW — the signals enrich
# the model + dashboard; only an `alert` behavior corroborates the action bar.
agent:
  enabled: false
  image:
    repository: ghcr.io/thejefflarson/protector-agent
    # Empty falls back to the chart's appVersion (Chart.yaml). Pin explicitly to override.
    tag: ""
    pullPolicy: IfNotPresent
  # Extra pod annotations for the agent DaemonSet. EMPTY by default. If you run a mesh
  # and the engine's ingest port enforces mTLS, mesh the agent here, e.g.:
  #   podAnnotations:
  #     linkerd.io/inject: enabled
  podAnnotations: {}
  # RAM-tight for arm64: in-kernel aggregation is cheap; userspace is a thin batcher.
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # Narrowest caps that load eBPF + create ring-buffer maps on a stock kernel. Still runs
  # as uid 0 (BPF caps aren't effective for a non-root uid even when granted) but drops
  # everything else — read-only observe. Flip privileged: true only to bisect a regression.
  privileged: false
  capabilities:
  - BPF
  - PERFMON
  - SYS_ADMIN
  - SYS_RESOURCE
  nodeSelector: {}
  affinity: {}
  # Run on every node, including tainted/control-plane ones.
  tolerations:
  - operator: Exists

# --- feed-fetcher sidecar (JEF-238) ---
# ON BY DEFAULT (feedSync.enabled: true). A co-located feed-fetcher SIDECAR (a native
# sidecar = an initContainer with restartPolicy: Always) on the engine pod fetches the
# FULL public CISA KEV catalogue (and, if you set advisoryUrl, an advisory snapshot) into
# a shared emptyDir the engine reads — so KEV exploit intel is fresh out of the box with
# no operator syncing it by hand and no further configuration.
#
# WHY A SIDECAR, NOT A CONFIGMAP (supersedes JEF-228). Raw CISA KEV JSON is ~1.5 MiB,
# over the 1 MiB ConfigMap limit (the CronJob path had to lossily strip it to CVE-IDs);
# advisory data does not fit at all. An emptyDir has NO size limit, so the sidecar fetches
# the data in FULL and the engine reads the complete files.
#
# EGRESS POSTURE — READ THIS. The sidecar is the ONE container the chart gives network
# egress to, and it is ON by default. It GETs PUBLIC, READ-ONLY feed URLs (kevUrl /
# advisoryUrl) and writes them to the shared emptyDir. Unlike the retired CronJob it makes
# NO apiserver call (no ServiceAccount grant, no RBAC). It NEVER reads cluster state and
# NEVER transmits any cluster data outward — the only bytes that leave are the plain GETs
# for the public feeds. The ENGINE itself stays ZERO-EGRESS (ADR-0015): it only reads the
# resulting files and makes no advisory/KEV network call of its own.
#
# TRADEOFF / FRAMING: engine zero-egress is preserved; the sidecar egresses to public
# feeds by default. TO RESTORE A FULLY AIR-GAPPED / ZERO-EGRESS POSTURE, set
# feedSync.enabled=false (then NOTHING in the chart egresses); to keep enrichment offline,
# mount your own kev.json / advisory.json into the engine at /var/lib/protector/feeds
# yourself. With the sidecar disabled, no sidecar/volume/feed-env renders.
#
# BOTH feeds ship a default public source, so KEV exploit intel AND advisory enrichment
# work out of the box (JEF-238). Clear a URL (or disable feedSync) to drop that feed.
feedSync:
  enabled: true
  # The two public, READ-ONLY feed sources. KEV is the canonical CISA catalogue (plain
  # JSON, fetched in FULL — the emptyDir has no ConfigMap size limit). advisoryUrl defaults
  # to the public NVD CVE JSON 2.0 "recent" feed.
  #
  # ADVISORY SOURCE + FORMAT (JEF-238). The advisory default is the NVD CVE JSON 2.0
  # "recent" feed: a GZIPPED, bounded (~9 MiB uncompressed), frequently-updated feed of the
  # most recently published/modified CVEs, each carrying a description (-> summary), CWE
  # weaknesses (-> cwe), and references (-> fix_ref). The sidecar fetches it with plain
  # curl and gunzips it (busybox gunzip ships in the curl image) — NO jq, NO transform, NO
  # extra image. It writes the RAW NVD JSON, and the engine's AdvisoryStore (ADR-0015) maps
  # the NVD shape onto its fields NATIVELY at parse time, under hard length caps (JEF-106).
  # The engine ALSO still accepts the curated CVE-keyed / {"advisories":[…]} shapes, so an
  # operator can point advisoryUrl at their own curated export instead (the sidecar always
  # gunzips the advisory feed, so a curated export must also be gzipped).
  #
  # SCOPE / FOLLOW-UP. "recent" covers actively-relevant CVEs (a rolling window), not the
  # full historical NVD corpus. Broader coverage — also pulling the "modified" feed and/or
  # a full-year backfill, which would need the sidecar to MERGE multiple NVD files (a jq or
  # engine-side multi-file read) — is a deliberate follow-up, not this change.
  kevUrl: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
  advisoryUrl: "https://nvd.nist.gov/feeds/json/cve/2.0/nvdcve-2.0-recent.json.gz"
  # Re-fetch interval (a `sleep` arg: e.g. "12h", "6h", "30m"). KEV/advisory feeds change
  # at most daily; 12h keeps them fresh without spending much egress.
  interval: "12h"
  # The fetcher image. A CURL-ONLY image (no apiserver client needed anymore — and
  # bitnami/kubectl was pulled from Docker Hub, cluster fork). Pinned by tag. The image's
  # unprivileged user is uid 100 / gid 101 (set in the sidecar securityContext).
  image:
    repository: curlimages/curl
    tag: "8.11.1"
    pullPolicy: IfNotPresent
  # Per-feed download wall (s) for curl --max-time, bounding a slow/hung feed host.
  curlMaxTimeSecs: 120
  # Tiny: a curl loop writing two files. Override for very large advisory snapshots.
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
